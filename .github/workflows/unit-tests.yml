name: Unit Tests

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - develop

jobs:
  skip-budget:
    name: Skipped-test budget
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Check skip budget
        run: node scripts/check-skip-budget.mjs

  unit-tests:
    name: Nx affected unit tests
    runs-on: ubuntu-latest
    # A microtask-spinning test starves vitest's own timeout timer entirely
    # (see billing's RenewalAutomationSettings hang), so the job needs its own
    # backstop instead of the 6h default.
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Required for `nx affected --base/--head` on PRs; shallow clones can miss the base SHA.
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache Nx computation cache
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: nx-cache-${{ runner.os }}-${{ hashFiles('package-lock.json', 'nx.json', 'tsconfig.base.json', '**/project.json') }}
          restore-keys: |
            nx-cache-${{ runner.os }}-

      - name: Upgrade npm to version 11
        run: npm install -g npm@11

      # No npm install fallback: a failing npm ci means the lockfile is out of
      # sync with a package.json, and regenerating dependencies on the fly once
      # swapped vitest 3→4 and silently broke test-file serialization. Fail
      # loudly instead.
      - name: Install dependencies
        run: npm ci

      # A few contract tests shell out to ripgrep (execFileSync('rg', ...)) to
      # assert on source layout; it isn't on the runner by default.
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      # Build the shared infra libraries' dist before testing. Most package
      # vitest configs alias @alga-psa/<lib> to src, but a handful (auth, sla,
      # reporting, onboarding, reference-data) resolve @alga-psa/db et al. via the
      # package "exports" -> dist, which nothing else builds in this job (the nx
      # `test` target has no `dependsOn: ^build`). Without this their suites die at
      # collection with `Failed to resolve entry for package "@alga-psa/db"`.
      # `dependsOn: ^build` cascades to each lib's own deps, so this set covers the
      # horizontal libs real-import tests pull in.
      - name: Build shared libraries
        run: npx nx run-many -t build --projects=@alga-psa/db,@alga-psa/core,@alga-psa/shared,@alga-psa/types,@alga-psa/event-bus,@alga-psa/event-schemas,@alga-psa/validation,@alga-psa/formatting,@alga-psa/search --parallel=3
        env:
          NX_DAEMON: 'false'
          NODE_OPTIONS: '--max-old-space-size=8192'

      - name: Determine Nx base/head
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "NX_BASE=${{ github.event.pull_request.base.sha }}" >> $GITHUB_ENV
            echo "NX_HEAD=${{ github.event.pull_request.head.sha }}" >> $GITHUB_ENV
          else
            echo "NX_BASE=${{ github.event.before }}" >> $GITHUB_ENV
            echo "NX_HEAD=${{ github.sha }}" >> $GITHUB_ENV
          fi

      # Same two-pass split as typecheck.yml: the server app's vitest config inlines
      # next/next-auth and needs most of the runner's memory to itself, so libraries
      # run in parallel first and the heavy apps run serially afterwards (libraries
      # are instant Nx cache hits in pass 2).
      # temporal-workflows' suite needs live Postgres/Redis/Temporal (49 of its
      # 71 tests fail without them) and its clients reconnect forever, so the
      # vitest process never exits and hangs the job. It has no place in a
      # unit-test gate until its tests stub their connections.
      # Blocking since 2026-07-17: the known-red package suites were burned down
      # and the runner layer is sound (test targets resolve via nx:run-script —
      # each package's own `npm run test` -> vitest — not the broken
      # @nx/vite:test executor). A red step here is a real test failure; fix the
      # cause, never re-add continue-on-error.
      # Run one package suite at a time. Three concurrent Vitest processes made
      # otherwise stable async UI tests miss their 5s waits on hosted runners.
      - name: Nx affected tests (libraries, serial)
        run: npx nx affected -t test --base=$NX_BASE --head=$NX_HEAD --output-style=static --parallel=1 --exclude=server,sebastian-ee,temporal-workflows
        env:
          NX_DAEMON: 'false'
          NODE_OPTIONS: '--max-old-space-size=4096'
          # Fixed shuffle seed so order-dependent failures are reproducible across reruns.
          VITEST_SEED: '20260610'

      # sebastian-ee's inferred test target is a bare `vitest` over its full
      # 209-file suite (~50 minutes serial — far past this job's 30-minute
      # backstop, which it blew via WorkflowAiSchemaSection's render-loop hang
      # before that was fixed). Excluded until the suite gets a bounded
      # unit-test target that fits a PR gate.
      - name: Nx affected tests (apps, isolated & serial)
        run: npx nx affected -t test --base=$NX_BASE --head=$NX_HEAD --output-style=static --parallel=1 --exclude=temporal-workflows,sebastian-ee
        env:
          NX_DAEMON: 'false'
          NODE_OPTIONS: '--max-old-space-size=14336'
          VITEST_SEED: '20260610'

  # Coverage report for the full server unit suite. Push-to-main only (it
  # re-runs the whole suite with instrumentation, too slow for every PR). This
  # is the only gate that runs the entire server suite, so it fails loudly:
  # a red run here means main has real test failures — triage the same day.
  # Scope is src/test/unit only: src/test/infrastructure is DB-backed and runs
  # in its own job below with a Postgres service.
  coverage-report:
    name: Server unit suite + coverage
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Upgrade npm to version 11
        run: npm install -g npm@11
      - name: Install dependencies
        run: npm ci
      # A few contract tests shell out to ripgrep; it isn't on the runner by default.
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Run server unit tests with coverage
        working-directory: ./server
        run: npx vitest run src/test/unit --coverage.enabled=true --coverage.reporter=text-summary --coverage.reporter=lcov --coverage.reporter=json-summary --reporter=default --reporter=json --outputFile.json=./test-results.json
        env:
          NODE_OPTIONS: '--max-old-space-size=14336'
          VITEST_SEED: '20260610'
      # `if: always()`: a red run is exactly the data point the coverage
      # artifact and metrics sheet exist to capture.
      - name: Upload lcov artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-unit-coverage
          path: server/coverage/lcov.info
          retention-days: 30
      # Appends pass/coverage numbers to the shared metrics sheet
      # (docs/reference/test-metrics.md). No-op until the Google secrets exist.
      - name: Record metrics to Google Sheet
        if: always()
        continue-on-error: true
        run: node scripts/record-test-metrics.mjs
        env:
          TEST_METRICS_SUITE: unit-coverage
          TEST_METRICS_RESULTS: server/test-results.json
          TEST_METRICS_COVERAGE: server/coverage/coverage-summary.json
          TEST_METRICS_DETAIL: '1'
          GOOGLE_SA_KEY: ${{ secrets.TEST_METRICS_GOOGLE_SA_KEY }}
          TEST_METRICS_SHEET_ID: ${{ vars.TEST_METRICS_SHEET_ID }}

  # DB-backed infrastructure tests run inside integration-tests.yml (sharing its
  # Postgres job): Tier-1 subset on PRs, full suite nightly — both non-blocking.
