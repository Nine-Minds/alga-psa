        schedule_id:
          type: string
          format: uuid
          description: Primary key from asset_maintenance_schedules.schedule_id.
        asset_id:
          type: string
          format: uuid
          description: Asset UUID from asset_maintenance_schedules.asset_id.
        schedule_type:
          type: string
          description: Maintenance schedule type as used by ApiAssetController.
        frequency:
          type: string
          description: Recurrence frequency.
        frequency_interval:
          type:
            - number
            - "null"
          description: Frequency multiplier.
        start_date:
          type:
            - string
            - "null"
          description: Schedule start date/time.
        end_date:
          type:
            - string
            - "null"
          description: Schedule end date/time.
        last_maintenance:
          type:
            - string
            - "null"
          description: Last recorded maintenance date/time.
        next_maintenance:
          type:
            - string
            - "null"
          description: Next calculated maintenance date/time.
        notes:
          type:
            - string
            - "null"
          description: Free-text schedule notes.
        assigned_to:
          type:
            - string
            - "null"
          format: uuid
          description: Assigned user UUID.
        is_active:
          type: boolean
          description: Whether the schedule is active.
        schedule_config:
          type:
            - object
            - "null"
          additionalProperties: {}
          description: Custom scheduling configuration.
        created_at:
          type: string
          format: date-time
          description: Creation timestamp.
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp.
        tenant:
          type: string
          format: uuid
          description: Tenant UUID scoped from the request context.
      required:
