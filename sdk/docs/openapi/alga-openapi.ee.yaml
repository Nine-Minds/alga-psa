    DocumentDownloadError:
      type: object
      properties:
        error:
          type: string
          description: Human-readable error message.
        permissionError:
          type: string
          description: Permission-denied message returned by the underlying document
            action in some RBAC failures.
    DocumentPlainTextError:
      type: string
      description: Plain text error response.
    EmailErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Human-readable error message.
        success:
          type: boolean
          description: Present on some failure responses.
        retryable:
          type: boolean
          description: Whether a webhook sender should retry the request.
      required:
        - error
