        end_date:
          type: string
          format: date-time
          description: Optional schedule end date/time.
        notes:
          type: string
          description: Free-text schedule notes.
        assigned_to:
          type: string
          format: uuid
          description: Assigned user UUID from users.user_id.
        is_active:
          type: boolean
          description: Whether the schedule is active.
        schedule_config:
          type: object
          additionalProperties: {}
          description: Custom scheduling configuration.
    AssetMaintenanceScheduleResource:
      type: object
