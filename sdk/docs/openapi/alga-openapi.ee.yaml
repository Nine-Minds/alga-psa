      required:
        - provider
    EmailOAuthInitiateResponse:
      type: object
      properties:
        success:
          type: boolean
          enum:
            - true
          description: OAuth initiation succeeded.
        authUrl:
          type: string
          format: uri
          description: Provider authorization URL for the browser to visit.
        provider:
          type: string
          enum:
            - microsoft
            - google
          description: Email OAuth provider being authorized.
        state:
          type: string
          description: Base64-encoded OAuth state containing tenant, userId, providerId,
            redirectUri, timestamp, nonce, and hosted flag.
      required:
        - success
        - authUrl
        - provider
        - state
    EmailOAuthState:
      type: object
      properties:
        tenant:
          type: string
          description: Tenant identifier from the authenticated user session.
        userId:
          type: string
          description: User UUID from the authenticated session.
        providerId:
          type: string
          format: uuid
          description: Email provider configuration UUID from the initiate request.
        redirectUri:
          type: string
          description: OAuth redirect URI included in the authorization request.
        timestamp:
          type: number
          description: Epoch milliseconds when state was generated.
        nonce:
          type: string
          description: Random hex nonce for CSRF correlation.
        hosted:
          type: boolean
          description: Whether hosted credentials are used for the flow.
      required:
        - tenant
        - redirectUri
        - timestamp
        - nonce
    EmailRefreshWatchRequest:
