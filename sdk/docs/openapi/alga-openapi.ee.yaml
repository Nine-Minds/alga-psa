  /api/files/{fileId}/download:
    get:
      summary: Download file by ID
      description: Downloads a stored external file as an attachment by
        external_files.file_id. The route is skipped by API-key middleware and
        relies on session/tenant resolution through createTenantKnex and
        StorageService. Storage lookup is tenant-scoped to external_files.tenant
        and is_deleted=false, but the handler performs no explicit per-document
        authorization; any user resolved into the tenant can download a file by
        fileId. The response body is binary and Content-Type is taken from
        stored file metadata.
      tags:
        - Files
      security:
        - SessionCookieAuth: []
      extensions:
        x-api-key-auth-skipped: true
        x-tenant-scoped-storage: true
        x-explicit-document-authorization: false
      parameters:
        - schema:
            type: string
            format: uuid
            description: File UUID from external_files.file_id to download. The handler does
              not validate UUID syntax before querying storage metadata.
          required: true
          description: File UUID from external_files.file_id to download. The handler does
            not validate UUID syntax before querying storage metadata.
          name: fileId
          in: path
      responses:
        "200":
          description: Binary file download with attachment Content-Disposition.
            Content-Type varies by stored MIME type.
          content:
            application/octet-stream:
              schema:
                $ref: "#/components/schemas/FileBinaryDownloadResponse"
        "404":
          description: Tenant could not be resolved by createTenantKnex.
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/FileDownloadPlainTextError"
        "500":
          description: File metadata/storage lookup failed or another download error
            occurred.
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/FileDownloadPlainTextError"
  /api/health:
    get:
      summary: Health check
      description: Simple unauthenticated liveness check for the Next.js API process.
        It performs no database, Redis, or downstream dependency checks and
        returns a fixed status/version payload when the process can serve HTTP
        requests.
      tags:
        - System
      security: []
      extensions:
        x-api-key-auth-skipped: true
        x-dependency-checks: false
      responses:
        "200":
          description: API process is alive and responding.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/healthz:
    get:
      summary: Liveness probe
      description: Kubernetes liveness endpoint. It returns a fixed healthy status
        with timestamp, uptime, version, and environment when the process can
        serve HTTP. It does not check database, Redis, or downstream
        dependencies; use /api/readyz for dependency-aware readiness.
      tags:
        - System
      security: []
      extensions:
        x-api-key-auth-skipped: true
        x-dependency-checks: false
        x-kubernetes-probe: liveness
      responses:
        "200":
          description: Process is alive and serving HTTP.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthzResponse"
  /api/readyz:
    get:
      summary: Readiness probe
      description: Kubernetes readiness endpoint for the Next.js API route. It checks
        database connectivity with SELECT 1 and returns 200 only when critical
        dependencies are available. The Redis check is currently a placeholder
        that mirrors the database result. This endpoint is unauthenticated and
        is explicitly skipped by API-key middleware.
      tags:
        - System
      security: []
