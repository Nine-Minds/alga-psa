      type: object
      properties:
        provider:
          type: string
          enum:
            - microsoft
            - google
          description: Email OAuth provider to authorize.
        redirectUri:
          type: string
          format: uri
          description: Optional OAuth callback URI. If omitted, the server builds
            /api/auth/{provider}/callback from the configured base URL.
        providerId:
          type: string
          format: uuid
          description: Email provider configuration ID to carry through OAuth state and
