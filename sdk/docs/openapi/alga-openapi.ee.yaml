          $ref: "#/components/schemas/AssetMaintenanceSchedulePayload"
        meta:
          $ref: "#/components/schemas/ApiResponseMeta"
      required:
        - success
        - data
        - meta
    AssetSearchQuery:
      type: object
      properties:
        query:
          type: string
          minLength: 1
          description: Required search term used in ILIKE clauses.
        fields:
          type: array
          items:
            type: string
            enum: &a13
              - asset_tag
              - name
              - serial_number
              - location
              - client_name
          description: Search fields. If omitted, the service searches asset_tag, name,
            serial_number, and location.
        asset_types:
          type: array
          items:
            type: string
            enum: *a1
          description: Optional asset type filters.
        statuses:
          type: array
          items:
            type: string
          description: Optional status filters.
        client_ids:
          type: array
          items:
            type: string
            format: uuid
          description: Optional client UUID filters.
        include_extension_data:
          type: string
          enum: &a14
            - "true"
            - "false"
          description: When true, the service fetches asset-type-specific extension data
            for every result.
        limit:
          type: string
          description: Maximum result count as a query string. Must parse to 1 through
            100; defaults to 25.
      required:
        - query
    AssetSearchPayload:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/AssetResource"
          description: Matching assets with HATEOAS links.
        _links:
          type: object
          properties:
            self:
              $ref: "#/components/schemas/HateoasLink"
          description: Search collection link. The controller currently points this at
            /api/v2/assets/search.
      required:
        - data
        - _links
    AssetSearchResponse:
      type: object
      properties:
        success:
          type: boolean
          enum:
            - true
        data:
          $ref: "#/components/schemas/AssetSearchPayload"
        meta:
          $ref: "#/components/schemas/ApiResponseMeta"
      required:
        - success
        - data
        - meta
    AssetStatsPayload:
      type: object
      properties:
        data:
          type: object
          properties:
            total_assets:
              type: integer
              description: Total asset count for the tenant.
            assets_added_this_month:
              type: integer
              description: Count of assets created since the start of the current month.
            average_asset_age_days:
              type:
                - integer
                - "null"
              description: Rounded average age in days from purchase_date, or null when
                unavailable.
            total_asset_value:
              type: number
              description: Sum of purchase_price values, treating null as zero.
            assets_by_type:
              type: object
              additionalProperties:
                type: integer
              description: Counts grouped by assets.asset_type.
            assets_by_status:
              type: object
              additionalProperties:
                type: integer
              description: Counts grouped by assets.status.
            assets_by_client:
              type: object
              additionalProperties:
                type: integer
              description: Top client counts grouped by clients.client_name. The service
                limits this grouping to 10 clients.
            warranty_expiring_soon:
              type: integer
              description: Count of warranties ending within 30 days.
            warranty_expired:
              type: integer
              description: Count of warranties already expired.
            maintenance_due:
              type: integer
              description: Count of active maintenance schedules with next_maintenance due now
                or earlier.
            maintenance_overdue:
              type: integer
              description: Count of active maintenance schedules overdue by more than seven
                days.
          required:
            - total_assets
            - assets_added_this_month
            - average_asset_age_days
            - total_asset_value
            - assets_by_type
            - assets_by_status
            - assets_by_client
            - warranty_expiring_soon
            - warranty_expired
            - maintenance_due
            - maintenance_overdue
        _links:
          type: object
          properties:
            self:
              $ref: "#/components/schemas/HateoasLink"
            assets:
              $ref: "#/components/schemas/HateoasLink"
          description: Stats links. The controller currently points these at
            /api/v2/assets paths.
      required:
        - data
        - _links
    AssetStatsResponse:
      type: object
      properties:
        success:
          type: boolean
          enum:
            - true
        data:
          $ref: "#/components/schemas/AssetStatsPayload"
        meta:
          $ref: "#/components/schemas/ApiResponseMeta"
      required:
        - success
        - data
        - meta
    LicenceCountHeaders:
