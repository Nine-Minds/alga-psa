            - preventive
            - inspection
            - calibration
            - replacement
          description: Type of maintenance schedule.
        frequency:
          type: string
          enum:
            - daily
            - weekly
            - monthly
            - quarterly
            - yearly
            - custom
          description: Recurrence frequency. Changing this triggers next_maintenance
