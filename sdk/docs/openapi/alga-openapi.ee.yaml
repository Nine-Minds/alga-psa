  /api/integrations/qbo/connect:
    get:
      summary: Start QuickBooks Online OAuth flow
      description: Browser-navigated endpoint that initiates the QuickBooks Online
        OAuth 2.0 authorization flow. The handler resolves tenant context with
        createTenantKnex, reads qbo_client_id from app secrets, generates a
        random CSRF value, embeds {tenantId, csrf} as base64url JSON in the
        state parameter, and redirects to Intuit at
        appcenter.intuit.com/connect/oauth2. The CSRF value is currently logged
        but not persisted, and the callback currently treats CSRF as valid. The
        route is not currently listed in apiKeySkipPaths, so middleware may
        require x-api-key before the browser can reach the handler.
      tags:
        - Integrations - QuickBooks
      security:
        - ApiKeyAuth: []
      extensions:
        x-oauth-provider: quickbooks-online
        x-redirect-endpoint: true
        x-middleware-api-key-required-currently: true
        x-csrf-validation-implemented: false
      responses:
        "302":
          description: Redirect to Intuit OAuth authorization URL. Location includes
            client_id, response_type=code, QuickBooks accounting scope,
            redirect_uri, and encoded state. The handler returns no JSON body.
        "401":
          description: Tenant context is missing in the handler, or x-api-key is missing
            at middleware before the handler runs.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QboErrorResponse"
        "500":
          description: QBO client ID is not configured, or an unexpected error occurred
            while constructing the authorization redirect.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QboErrorResponse"
  /api/integrations/qbo/callback:
    get:
      summary: Handle QuickBooks Online OAuth callback
      description: OAuth 2.0 redirect endpoint for QuickBooks Online. Intuit redirects
        the browser here with code, state, and realmId after authorization. The
        handler decodes tenantId and csrf from the base64url state parameter,
        exchanges the code for access and refresh tokens, stores credentials in
        the tenant secret qbo_credentials keyed by realmId, and redirects back
        to /msp/settings with qbo_status=success or qbo_status=failure and an
        error code. The route returns redirects rather than JSON from the
        handler. Like the connect route, it is not currently listed in
        apiKeySkipPaths, so middleware may reject real Intuit callbacks that do
        not include x-api-key.
      tags:
        - Integrations - QuickBooks
      security: []
      extensions:
        x-oauth-provider: quickbooks-online
        x-redirect-endpoint: true
        x-token-secret-name: qbo_credentials
        x-middleware-api-key-required-currently: true
        x-csrf-validation-implemented: false
      parameters:
        - schema:
            type: string
            description: OAuth 2.0 authorization code returned by Intuit. Required unless
              Intuit sends an error parameter.
          required: false
          description: OAuth 2.0 authorization code returned by Intuit. Required unless
            Intuit sends an error parameter.
          name: code
          in: query
        - schema:
            type: string
            description: Base64url-encoded JSON containing tenantId and csrf generated by
              the connect endpoint.
          required: false
          description: Base64url-encoded JSON containing tenantId and csrf generated by
            the connect endpoint.
          name: state
          in: query
        - schema:
            type: string
            description: QuickBooks company/realm ID returned by Intuit.
          required: false
          description: QuickBooks company/realm ID returned by Intuit.
          name: realmId
          in: query
        - schema:
            type: string
            description: OAuth error returned by Intuit when authorization fails or is
              denied.
          required: false
          description: OAuth error returned by Intuit when authorization fails or is denied.
          name: error
          in: query
      responses:
        "307":
          description: Redirect to the MSP settings integrations page. Success redirects
            with qbo_status=success; failures redirect with qbo_status=failure
            and an error such as qbo_error, missing_params, invalid_state,
            csrf_mismatch, config_error, token_exchange_failed, or
            callback_processing_error. The handler returns no JSON body.
        "401":
          description: Middleware-level API-key rejection can occur before the OAuth
            callback handler runs.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QboErrorResponse"
