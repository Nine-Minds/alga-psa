        - tenant_id
        - license_count
    LicenceCountUpdateResponse:
      type: object
      properties:
        success:
          type: boolean
          enum:
            - true
          description: Indicates the license count update was accepted.
        tenant_id:
          type: string
          description: Echoed tenant identifier that was updated.
        license_count:
          type: integer
          description: Echoed licensed user count that was written.
        updated_at:
          type: string
          format: date-time
          description: ISO timestamp generated by the handler for this response.
      required:
        - success
        - tenant_id
        - license_count
        - updated_at
    LicenceCountErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Human-readable error message.
      required:
        - error
    ChatMessage:
