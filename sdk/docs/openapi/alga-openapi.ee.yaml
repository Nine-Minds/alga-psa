openapi: 3.1.0
info:
  title: Alga PSA API
  version: 0.1.0
  description: OpenAPI specification generated from registered route metadata.
servers:
  - url: https://algapsa.com
    description: Production
  - url: http://localhost:3000
    description: Local development
tags:
  - name: Admin
  - name: Assets
  - name: Auth
  - name: Billing
  - name: Boards
  - name: Chat
  - name: Documents
  - name: Email
  - name: Extension Gateway
  - name: Extension Installs
  - name: Files
  - name: Integrations - QuickBooks
  - name: Products
  - name: Projects
  - name: Service Catalog
  - name: Service Categories
  - name: Service Types
  - name: Services
  - name: SoftwareOne Extensions
  - name: Statuses
  - name: System
  - name: Telemetry
  - name: assets
  - name: auth
  - name: automation
  - name: billing-analytics
  - name: categories
  - name: client-contract-lines
  - name: clients
  - name: contacts
  - name: contract-line-templates
  - name: contract-lines
  - name: contracts
  - name: ext-bundles
  - name: extensions
  - name: feature-access
  - name: feature-flags
  - name: financial
  - name: integrations
  - name: invoices
  - name: meta
  - name: permission-checks
  - name: permissions
  - name: projects
  - name: provisioning
  - name: quickbooks
  - name: quotes
  - name: rbac
  - name: roles
  - name: schedules
  - name: tags
  - name: teams
  - name: test-auth
  - name: tickets
  - name: time-entries
  - name: time-periods
  - name: time-sheets
  - name: user
  - name: user-roles
  - name: users
  - name: webhooks
  - name: workflows
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Auth.js JWE session token
    SessionCookieAuth:
      type: apiKey
      in: cookie
      name: authjs.session-token
      description: Auth.js session cookie. In secure production deployments the cookie
        may be named __Secure-authjs.session-token; in local development it may
        include a port suffix.
    WebhookSignatureAuth:
      type: apiKey
      in: header
      name: x-webhook-signature
      description: HMAC-SHA256 signature generated with ALGA_WEBHOOK_SECRET. POST
        signs the raw JSON body. GET signs the string GET:<tenant_id>.
    GooglePubSubJWT:
      type: http
      scheme: bearer
      bearerFormat: Google Pub/Sub JWT
      description: Google-signed JWT from Pub/Sub push. The webhook validates the
        audience against the webhook URL and checks the issuer/service account
        against tenant Google configuration.
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details: {}
          required:
            - code
            - message
      required:
        - error
    PlaceholderObject:
      type: object
      properties: {}
    OAuthCallbackHtmlResponse:
      type: string
      description: HTML popup callback page. The page posts a JSON oauth-callback
        message to window.opener or window.parent via postMessage, then attempts
        to close itself.
    OAuthCallbackQuery:
      type: object
      properties:
        code:
          type: string
          description: OAuth 2.0 authorization code. Required unless the provider returned
            error.
        state:
          type: string
          description: Base64-encoded JSON state object generated when the OAuth flow was
            initiated. It carries tenant context, providerId, redirectUri,
            timestamp, and nonce values used to complete the callback.
        error:
          type: string
          description: OAuth error code returned by the provider, such as access_denied.
        error_description:
          type: string
          description: Human-readable OAuth error description returned by the provider.
    AuthSessionUser:
      type: object
      properties:
        id:
          type: string
          description: User identifier from the users.user_id record.
        email:
          type: string
          format: email
          description: User's email address.
        name:
          type: string
          description: User's display name, usually first_name plus last_name.
        username:
          type: string
          description: User's login username.
        image:
          type: string
          description: Avatar or profile image URL.
        proToken:
          type: string
          description: Legacy Pro token value when present.
        tenant:
          type: string
          description: Tenant UUID from the user session JWT.
        tenantSlug:
          type: string
          description: URL-safe tenant slug for portal routing.
        user_type:
          type: string
          enum:
            - client
            - internal
          description: User classification from users.user_type.
        clientId:
          type: string
          format: uuid
          description: Client UUID from contacts.client_id for client-portal users.
        contactId:
          type: string
          format: uuid
          description: Contact UUID from users.contact_id for client-portal users.
        plan:
          type: string
          description: Current tenant billing plan key.
        addons:
          type: array
          items:
            type: string
          description: Enabled tenant add-on keys.
        trial_end:
          type:
            - string
            - "null"
          description: Trial expiry timestamp when present.
        subscription_status:
          type:
            - string
            - "null"
          enum:
            - active
            - trialing
            - past_due
            - unpaid
          description: Billing subscription status copied into the session token.
        solo_pro_trial_end:
          type:
            - string
            - "null"
          description: Solo Pro trial expiry timestamp when present.
        premium_trial_end:
          type:
            - string
            - "null"
          description: Premium trial expiry timestamp when present.
        premium_trial_confirmed:
          type: boolean
          description: Whether the user confirmed the Premium trial.
        premium_trial_effective_date:
          type:
            - string
            - "null"
          description: Premium trial effective date when present.
      required:
        - id
        - email
        - name
        - username
    AuthSessionAuthenticatedResponse:
      type: object
      properties:
        session_id:
          type: string
          format: uuid
          description: Current session UUID from the sessions table, created at sign-in.
        login_method:
          type: string
          description: Authentication method used for this session, such as credentials,
            google, or azure-ad.
        user:
          $ref: "#/components/schemas/AuthSessionUser"
      required:
        - user
    EmptyObjectResponse:
      type: object
      properties: {}
      additionalProperties: false
      description: Empty object returned when no authenticated session is present.
    AuthSessionResponse:
      anyOf:
        - $ref: "#/components/schemas/AuthSessionAuthenticatedResponse"
        - $ref: "#/components/schemas/EmptyObjectResponse"
      description: Authenticated session data, or an empty object when the request has
        no valid session cookie.
    FlatErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Human-readable error message.
      required:
        - error
    ValidateApiKeyHeaders:
      type: object
      properties:
        x-api-key:
          type: string
          minLength: 1
          description: Plaintext API key to validate. The service hashes this value before
            looking up the api_keys record.
      required:
        - x-api-key
    ValidateApiKeyResponse:
      type: object
      properties:
        isValid:
          type: boolean
          enum:
            - true
          description: Indicates that the API key is active and valid.
        userId:
          type: string
          format: uuid
          description: UUID of the user who owns the API key, from api_keys.user_id.
        tenant:
          type: string
          description: Tenant identifier scoped to this API key, from api_keys.tenant.
      required:
        - isValid
        - userId
        - tenant
    ValidateTokenHeaders:
      type: object
      properties:
        authorization:
          type: string
          description: Optional Bearer token fallback. The route also accepts the Auth.js
            session token cookie.
    ValidateTokenSuccessResponse:
      type: object
      properties:
        isValid:
          type: boolean
          enum:
            - true
          description: Indicates that the request contains a valid Auth.js session token.
        userType:
          type: string
          enum:
            - internal
            - client
          description: User classification from users.user_type in the session JWT.
        tenant:
          type: string
          description: Tenant identifier from the session JWT.
      required:
        - isValid
        - userType
        - tenant
    ValidateTokenUnauthorizedResponse:
      type: object
      properties:
        isValid:
          type: boolean
          enum:
            - false
          description: No valid session token was found.
      required:
        - isValid
    NextAuthCatchAllParams:
      type: object
      properties:
        nextauth:
          type: string
          description: NextAuth catch-all action path. Common values include csrf,
            providers, signin, signout, session, error, verify-request,
            webauthn-options, callback/credentials, callback/google,
            callback/azure-ad, and callback/keycloak.
      required:
        - nextauth
    NextAuthGetQuery:
      type: object
      properties:
        callbackUrl:
          type: string
          description: Optional URL to redirect to after sign-in or sign-out flows.
        error:
          type: string
          description: Optional NextAuth/OAuth error code shown by sign-in or error pages.
        code:
          type: string
          description: OAuth authorization code for provider callback sub-routes.
        state:
          type: string
          description: OAuth state value for provider callback sub-routes.
        error_description:
          type: string
          description: Human-readable provider error description for OAuth callback
            sub-routes.
    CsrfTokenResponse:
      type: object
      properties:
        csrfToken:
          type: string
          description: Opaque double-submit CSRF token required for mutating NextAuth POST
            actions.
      required:
        - csrfToken
    ProviderInfo:
      type: object
      properties:
        id:
          type: string
          description: Provider identifier such as credentials, google, azure-ad, or
            keycloak.
        name:
          type: string
          description: Provider display name.
        type:
          type: string
          enum:
            - oauth
            - oidc
            - credentials
            - email
            - webauthn
          description: NextAuth provider type.
        signinUrl:
          type: string
          description: URL used to initiate sign-in with this provider.
        callbackUrl:
          type: string
          description: URL the provider redirects to after authentication.
      required:
        - id
        - name
        - type
        - signinUrl
        - callbackUrl
    AuthProvidersResponse:
      type: object
      additionalProperties:
        $ref: "#/components/schemas/ProviderInfo"
      description: Map of configured providers keyed by provider ID.
    NextAuthGetResponse:
      anyOf:
        - $ref: "#/components/schemas/AuthSessionAuthenticatedResponse"
        - $ref: "#/components/schemas/EmptyObjectResponse"
        - $ref: "#/components/schemas/CsrfTokenResponse"
        - $ref: "#/components/schemas/AuthProvidersResponse"
        - $ref: "#/components/schemas/OAuthCallbackHtmlResponse"
        - $ref: "#/components/schemas/EmptyObjectResponse"
      description: "Representative successful GET response for the NextAuth catch-all
        route. The exact payload depends on the nextauth action: session returns
        a session object or {}, csrf returns csrfToken, providers returns a
        provider map, and page actions return HTML or redirects."
    NextAuthPostBody:
      type: object
      properties:
        email:
          type: string
          format: email
          description: Credentials-provider email address for callback/credentials.
        password:
          type: string
          description: Credentials-provider plaintext password for callback/credentials.
        twoFactorCode:
          type: string
          description: TOTP code required when two-factor authentication is enabled and
            the device is not trusted.
        userType:
          type: string
          enum:
            - client
            - internal
          description: Optional user type used to scope credentials-provider lookup.
        tenant:
          type: string
          description: Optional tenant slug used to resolve the tenant for
            credentials-provider login.
        csrfToken:
          type: string
          description: CSRF token from GET /api/auth/csrf. Required for sign-in, sign-out,
            and other mutating NextAuth actions.
        callbackUrl:
          type: string
          description: Post-authentication redirect URL.
        redirect:
          type: string
          description: NextAuth redirect mode flag.
        json:
          type: string
          description: NextAuth JSON response mode flag.
        code:
          type: string
          description: OAuth authorization code for provider callback actions.
        state:
          type: string
          description: OAuth state value for provider callback actions.
        error:
          type: string
          description: Provider OAuth error code for callback actions.
        error_description:
          type: string
          description: Provider OAuth error description for callback actions.
    RedirectResponse:
      type: string
      description: HTTP redirect response. NextAuth sets or clears cookies depending
        on the action.
    TelemetrySettingsGetResponse:
      type: object
      properties:
        usageStatsEnabled:
          type: boolean
          description: Whether usage statistics are enabled by the ALGA_USAGE_STATS
            environment variable.
        environmentVariable:
          type: string
          enum:
            - ALGA_USAGE_STATS
          description: Environment variable controlling telemetry collection.
        currentValue:
          type: string
          description: Raw ALGA_USAGE_STATS environment value, or not set when absent.
        controlledBy:
          type: string
          enum:
            - environment
          description: Telemetry is controlled by process environment, not runtime API
            writes.
        message:
          type: string
          description: Human-readable explanation of the current telemetry setting.
      required:
        - usageStatsEnabled
        - environmentVariable
        - currentValue
        - controlledBy
        - message
    TelemetrySettingsPostResponse:
      type: object
      properties:
        usageStatsEnabled:
          type: boolean
          description: Whether usage statistics are enabled by the ALGA_USAGE_STATS
            environment variable.
        controlledBy:
          type: string
          enum:
            - environment
          description: Telemetry is controlled by process environment, not runtime API
            writes.
        message:
          type: string
          description: Explains that telemetry settings cannot be changed through this API.
      required:
        - usageStatsEnabled
        - controlledBy
        - message
    AdminTelemetryErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Error message such as Authentication required, Insufficient
            permissions, or the handler failure message.
      required:
        - error
    AssetListQuery:
      type: object
      properties:
        page:
          type: string
          description: Page number as a query string. Defaults to 1 after validation.
        limit:
          type: string
          description: Page size as a query string. Must parse to 1 through 100; defaults
            to 25.
        sort:
          type: string
          description: Sort column. Defaults to created_at.
        order:
          type: string
          enum: &a4
            - asc
            - desc
          description: Sort direction. Defaults to desc.
        search:
          type: string
          description: General search filter accepted by the shared filter schema. The
            current AssetService.list implementation does not apply this filter.
        created_from:
          type: string
          format: date-time
          description: Accepted by validation, but not currently applied by
            AssetService.list.
        created_to:
          type: string
          format: date-time
          description: Accepted by validation, but not currently applied by
            AssetService.list.
        updated_from:
          type: string
          format: date-time
          description: Accepted by validation, but not currently applied by
            AssetService.list.
        updated_to:
          type: string
          format: date-time
          description: Accepted by validation, but not currently applied by
            AssetService.list.
        is_active:
          type: string
          enum: &a5
            - "true"
            - "false"
          description: Accepted by validation, but not currently applied by
            AssetService.list.
        asset_tag:
          type: string
          description: Partial asset tag match using ILIKE.
        name:
          type: string
          description: Partial asset name match using ILIKE.
        client_id:
          type: string
          format: uuid
          description: Client UUID from clients.client_id.
        asset_type:
          type: string
          enum: &a1
            - workstation
            - network_device
            - server
            - mobile_device
            - printer
            - unknown
          description: Asset type stored in assets.asset_type.
        status:
          type: string
          description: Exact asset status match.
        location:
          type: string
          description: Partial location match using ILIKE.
        client_name:
          type: string
          description: Partial client name match; joins clients on client_id and tenant.
        has_warranty:
          type: string
          enum: &a6
            - "true"
            - "false"
          description: true requires warranty_end_date to be non-null; false requires it
            to be null.
        warranty_expired:
          type: string
          enum: &a7
            - "true"
            - "false"
          description: true filters warranty_end_date before now; false filters future
            warranty dates or no warranty.
        maintenance_due:
          type: string
          enum: &a8
            - "true"
            - "false"
          description: Accepted by validation, but not currently applied by
            AssetService.list.
        purchase_date_from:
          type: string
          format: date-time
          description: Filter purchase_date greater than or equal to this timestamp.
        purchase_date_to:
          type: string
          format: date-time
          description: Filter purchase_date less than or equal to this timestamp.
        warranty_end_from:
          type: string
          format: date-time
          description: Filter warranty_end_date greater than or equal to this timestamp.
        warranty_end_to:
          type: string
          format: date-time
          description: Filter warranty_end_date less than or equal to this timestamp.
    AssetExportQuery:
      type: object
      properties:
        format:
          type: string
          enum: &a9
            - csv
            - json
            - xlsx
          description: Export format. csv returns text/csv; json and xlsx currently return
            the same JSON envelope.
        include_extension_data:
          type: string
          enum: &a10
            - "true"
            - "false"
          description: Accepted by validation, but currently ignored by
            ApiAssetController.export.
        include_maintenance:
          type: string
          enum: &a11
            - "true"
            - "false"
          description: Accepted by validation, but currently ignored by
            ApiAssetController.export.
        include_documents:
          type: string
          enum: &a12
            - "true"
            - "false"
          description: Accepted by validation, but currently ignored by
            ApiAssetController.export.
        asset_types:
          type: array
          items:
            type: string
            enum: *a1
          description: Accepted by validation as an array, but the controller builds query
            values with Object.fromEntries and does not apply this filter.
        statuses:
          type: array
          items:
            type: string
          description: Accepted by validation as an array, but not currently applied.
        client_ids:
          type: array
          items:
            type: string
            format: uuid
          description: Accepted by validation as an array, but not currently applied.
        fields:
          type: array
          items:
            type: string
          description: Accepted by validation as an array, but not currently used to
            select export columns.
    AssetDocumentAssociationParams:
      type: object
      properties:
        associationId:
          type: string
          format: uuid
          description: Document association UUID from document_associations.association_id.
      required:
        - associationId
    AssetExtensionData:
      type: object
      additionalProperties: {}
      description: Asset-type-specific extension data written to the corresponding
        extension table for workstation, network device, server, mobile device,
        or printer assets.
    AssetCreateRequest:
      type: object
      properties:
        client_id:
          type: string
          format: uuid
          description: Client UUID from clients.client_id. Required.
        asset_type:
          type: string
          enum: *a1
          description: Asset type. Determines the optional extension data table.
        asset_tag:
          type: string
          minLength: 1
          maxLength: 255
          description: Required tenant-specific asset tag.
        name:
          type: string
          minLength: 1
          maxLength: 255
          description: Required asset name.
        status:
          type: string
          minLength: 1
          description: Required asset status.
        location:
          type: string
          description: Optional asset location.
        serial_number:
          type: string
          description: Optional serial number.
        purchase_date:
          type: string
          format: date-time
          description: Optional purchase date/time.
        warranty_end_date:
          type: string
          format: date-time
          description: Optional warranty end date/time.
        extension_data:
          $ref: "#/components/schemas/AssetExtensionData"
      required:
        - client_id
        - asset_type
        - asset_tag
        - name
        - status
    AssetUpdateData:
      type: object
      properties:
        client_id:
          type: string
          format: uuid
          description: Client UUID to assign to the asset.
        asset_type:
          type: string
          enum: *a1
          description: Asset type to store in assets.asset_type.
        asset_tag:
          type: string
          minLength: 1
          maxLength: 255
          description: Tenant-specific asset tag.
        name:
          type: string
          minLength: 1
          maxLength: 255
          description: Asset name.
        status:
          type: string
          minLength: 1
          description: Asset status.
        location:
          type: string
          description: Asset location.
        serial_number:
          type: string
          description: Serial number.
        purchase_date:
          type: string
          format: date-time
          description: Purchase date/time.
        warranty_end_date:
          type: string
          format: date-time
          description: Warranty end date/time.
    AssetBulkUpdateRequest:
      type: object
      properties:
        assets:
          type: array
          items:
            type: object
            properties:
              asset_id:
                type: string
                format: uuid
                description: Asset UUID from assets.asset_id.
              data:
                allOf:
                  - $ref: "#/components/schemas/AssetUpdateData"
                  - description: Partial update data validated with updateAssetSchema.
            required:
              - asset_id
              - data
          minItems: 1
          maxItems: 50
          description: Assets to update. Limited to 1 through 50 entries by validation.
      required:
        - assets
    AssetBulkStatusRequest:
      type: object
      properties:
        asset_ids:
          type: array
          items:
            type: string
            format: uuid
          minItems: 1
          maxItems: 50
          description: Asset UUIDs from assets.asset_id. Limited to 1 through 50 entries
            by validation.
        status:
          type: string
          minLength: 1
          description: New status assigned to every asset in asset_ids.
      required:
        - asset_ids
        - status
    HateoasLink:
      type: object
      properties:
        href:
          type: string
          description: Target URL for the related operation.
        method:
          type: string
          description: HTTP method for the link when supplied.
      required:
        - href
    AssetLinks:
      type: object
      properties:
        self:
          $ref: "#/components/schemas/HateoasLink"
        edit:
          $ref: "#/components/schemas/HateoasLink"
        delete:
          $ref: "#/components/schemas/HateoasLink"
        list:
          $ref: "#/components/schemas/HateoasLink"
        documents:
          $ref: "#/components/schemas/HateoasLink"
        maintenance:
          $ref: "#/components/schemas/HateoasLink"
        history:
          $ref: "#/components/schemas/HateoasLink"
      description: HATEOAS links generated from the asset_id.
    AssetResource:
      type: object
      properties:
        asset_id:
          type: string
          format: uuid
          description: Primary key from assets.asset_id.
        client_id:
          type: string
          format: uuid
          description: Client UUID from assets.client_id.
        asset_type:
          type: string
          enum: *a1
          description: Asset type stored in assets.asset_type.
        asset_tag:
          type: string
          description: Tenant-specific asset tag.
        name:
          type: string
          description: Asset display name.
        status:
          type: string
          description: Asset status.
        location:
          type:
            - string
            - "null"
          description: Asset location, when recorded.
        serial_number:
          type:
            - string
            - "null"
          description: Asset serial number, when recorded.
        purchase_date:
          type:
            - string
            - "null"
          description: Asset purchase date from assets.purchase_date.
        warranty_end_date:
          type:
            - string
            - "null"
          description: Warranty end date from assets.warranty_end_date.
        created_at:
          type: string
          format: date-time
          description: Asset creation timestamp.
        updated_at:
          type: string
          format: date-time
          description: Asset last update timestamp.
        tenant:
          type: string
          format: uuid
          description: Tenant UUID from assets.tenant; filtered to the authenticated
            request context.
        client_name:
          type: string
          description: Client name selected from the joined clients table.
        warranty_status:
          type: string
          enum:
            - no_warranty
            - expired
            - expiring_soon
            - active
          description: Computed from warranty_end_date by SQL CASE expression.
        maintenance_status:
          type: string
          description: Optional computed maintenance status when present in service results.
        extension_data:
          allOf:
            - $ref: "#/components/schemas/AssetExtensionData"
            - type:
                - object
                - "null"
              description: Asset-type-specific extension data returned by getWithDetails after
                create.
        relationships:
          type: array
          items:
            type: object
            additionalProperties: {}
          description: Related asset rows included by getWithDetails after create.
        documents:
          type: array
          items:
            type: object
            additionalProperties: {}
          description: Associated document rows included by getWithDetails after create.
        maintenance_schedules:
          type: array
          items:
            type: object
            additionalProperties: {}
          description: Maintenance schedule rows included by getWithDetails after create.
        _links:
