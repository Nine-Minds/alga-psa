            historyId.
        messageId:
          type: string
          description: Google Pub/Sub message ID.
        publishTime:
          type: string
          description: ISO timestamp when Pub/Sub published the message.
      required:
        - data
        - messageId
        - publishTime
    GooglePubSubPushBody:
      type: object
      properties:
        message:
          $ref: "#/components/schemas/GooglePubSubMessage"
        subscription:
          type: string
          description: Full Pub/Sub subscription path, such as
            projects/{project}/subscriptions/{subscriptionName}.
      required:
        - message
        - subscription
    GmailNotificationPayload:
      type: object
      properties:
        emailAddress:
          type: string
          format: email
          description: Gmail mailbox address with new activity.
        historyId:
          type: string
          description: Gmail history ID indicating the mailbox change position.
      required:
        - emailAddress
        - historyId
    GoogleWebhookEnqueueResponse:
      type: object
      properties:
        success:
          type: boolean
          enum:
            - true
          description: Webhook was accepted.
        queued:
          type: boolean
          enum:
            - true
          description: The notification was enqueued for asynchronous processing.
        handoff:
          type: string
          enum:
            - unified_pointer_queue
          description: Queue handoff mechanism used for the Gmail notification pointer.
        providerId:
          type: string
          format: uuid
          description: Resolved email_providers.id for the Gmail mailbox.
        tenant:
          type: string
          description: Tenant identifier owning the provider.
        historyId:
          type: string
          description: Gmail history ID from the decoded notification.
        jobId:
          type: string
          format: uuid
          description: UUID assigned to the Redis queue job.
        queueDepth:
          type: integer
          description: Redis queue depth after enqueue.
      required:
        - success
        - queued
        - handoff
        - providerId
        - tenant
        - historyId
        - jobId
        - queueDepth
    GoogleWebhookSkippedResponse:
      type: object
      properties:
        success:
          type: boolean
          enum:
            - true
          description: Webhook request was accepted but no job was enqueued.
        message:
          type: string
          enum:
            - No data to process
            - No provider found
            - No google config found
          description: Reason the webhook did not enqueue work.
      required:
        - success
        - message
    MicrosoftWebhookValidationQuery:
      type: object
      properties:
        validationtoken:
          type: string
          description: Microsoft Graph subscription validation token. The handler also
            accepts validationToken with camel-case spelling.
        validationToken:
          type: string
          description: Camel-case variant of the Microsoft Graph validation token.
    MicrosoftWebhookTextResponse:
      type: string
      description: Plain text response. For validation requests, this is the
        validation token echoed verbatim; otherwise it may be OK or Internal
        Server Error.
    MicrosoftGraphResourceData:
      type: object
      properties:
        "@odata.type":
          type: string
          description: "OData resource type, such as #microsoft.graph.message."
        "@odata.id":
          type: string
          description: OData resource identifier.
        id:
          type: string
          description: Microsoft Graph message ID. If absent, the handler extracts it from
            resource.
        subject:
          type: string
          description: Optional message subject supplied by Microsoft Graph.
    MicrosoftGraphNotification:
      type: object
      properties:
        changeType:
          type: string
          description: Microsoft Graph change type, typically created for new mail.
        clientState:
          type: string
          description: Opaque verification token that must match
            microsoft_email_provider_config.webhook_verification_token when
            configured.
        resource:
          type: string
          description: Graph resource path, for example
            /users/{userId}/messages/{messageId}.
        resourceData:
          $ref: "#/components/schemas/MicrosoftGraphResourceData"
        subscriptionExpirationDateTime:
          type: string
          description: Microsoft Graph subscription expiry timestamp.
        subscriptionId:
          type: string
          description: Microsoft Graph subscription ID. Used to resolve
            microsoft_email_provider_config.webhook_subscription_id.
        tenantId:
          type: string
          description: Microsoft tenant GUID from the notification. Informational only;
            tenant is resolved from DB.
      required:
        - changeType
        - resource
        - resourceData
        - subscriptionId
    MicrosoftGraphWebhookBody:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/MicrosoftGraphNotification"
          description: Batch of Microsoft Graph change notifications.
      required:
        - value
    MicrosoftWebhookSuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          enum:
            - true
          description: Webhook request was processed successfully.
        queued:
          type: boolean
          description: Whether any notification pointer jobs were enqueued.
        handoff:
          type: string
          enum:
            - unified_pointer_queue
          description: Queue handoff mechanism used for Microsoft notification pointers.
        unifiedQueuedCount:
          type: integer
          description: Number of notification jobs enqueued.
        processedCount:
          type: integer
          description: Number of notifications processed.
        messageIds:
          type: array
          items:
            type: string
          description: Microsoft Graph message IDs that were enqueued.
      required:
        - success
        - queued
        - handoff
        - unifiedQueuedCount
        - processedCount
        - messageIds
    MicrosoftWebhookEmptyResponse:
      type: object
      properties:
        success:
          type: boolean
          enum:
            - true
          description: Webhook request was accepted.
        message:
          type: string
          description: Reason no notification jobs were enqueued.
      required:
        - success
        - message
    MicrosoftWebhookEnqueueErrorResponse:
      type: object
      properties:
        error:
          type: string
          enum:
            - Failed to enqueue one or more Microsoft pointer jobs
        failureCount:
          type: integer
          description: Number of enqueue failures.
        failures:
          type: array
          items:
            type: object
            properties:
              subscriptionId:
                type: string
                description: Microsoft Graph subscription ID from the notification.
              messageId:
                type: string
                description: Microsoft Graph message ID that failed to enqueue.
              providerId:
                type: string
                description: Resolved email provider ID.
              tenantId:
                type: string
                description: Resolved tenant identifier.
              reason:
                type: string
                description: Failure reason.
            required:
              - subscriptionId
              - messageId
              - providerId
              - tenantId
              - reason
          description: Per-notification enqueue failures.
      required:
        - error
        - failureCount
        - failures
