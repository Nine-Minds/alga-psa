        last_updated:
          type:
            - string
            - "null"
          description: ISO timestamp from tenants.last_license_update, or null if no
            license update has been recorded.
      required:
        - tenant_id
        - limit
        - used
        - remaining
        - last_updated
    LicenceCountUpdateRequest:
      type: object
      properties:
        tenant_id:
          type: string
          description: Tenant identifier from tenants.tenant whose licensed user count
            should be updated.
        license_count:
          type: integer
