        redis:
          type: boolean
          description: Redis readiness placeholder. Currently mirrors the database check
            result.
      required:
        - database
        - redis
    ReadyzReadyResponse:
      type: object
      properties:
        status:
          type: string
          enum:
            - ready
          description: All critical dependencies checked by this handler are available.
        timestamp:
          type: string
          format: date-time
          description: ISO timestamp generated when the readiness check is handled.
        uptime:
          type: number
          minimum: 0
          description: Process uptime in seconds from process.uptime().
        version:
          type: string
          description: Application version from npm_package_version, with handler fallback.
        checks:
          $ref: "#/components/schemas/ReadyzChecks"
      required:
        - status
        - timestamp
        - uptime
        - version
        - checks
    ReadyzNotReadyResponse:
      type: object
      properties:
        status:
          type: string
          enum:
            - not_ready
          description: One or more critical dependencies are unavailable.
        timestamp:
          type: string
          format: date-time
          description: ISO timestamp generated when the readiness check is handled.
        uptime:
          type: number
          minimum: 0
          description: Process uptime in seconds. Present in the dependency-failure
            branch, omitted by the catch branch.
        version:
          type: string
          description: Application version. Present only in the ready response branch.
        checks:
          $ref: "#/components/schemas/ReadyzChecks"
        error:
          type: string
          description: Readiness failure reason or caught exception message.
      required:
        - status
        - timestamp
        - checks
        - error
