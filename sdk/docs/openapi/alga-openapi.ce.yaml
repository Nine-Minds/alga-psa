    AutomationExecutionResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/AutomationExecution"
      required:
        - data
    AutomationErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              description: Machine-readable error code, such as UNAUTHORIZED, FORBIDDEN,
                VALIDATION_ERROR, or INTERNAL_ERROR.
            message:
              type: string
              description: Human-readable error message.
            details:
              description: Optional structured error details.
          required:
            - code
            - message
      required:
        - error
    AutomationMetaResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            trigger_types:
              type: array
              items:
                type: string
                enum: *a3
              description: Valid automation trigger types.
            action_types:
              type: array
              items:
                type: string
                enum: &a5
                  - email_notification
                  - sms_notification
                  - webhook_call
                  - database_update
                  - ticket_creation
                  - ticket_update
                  - project_update
                  - time_entry_creation
                  - invoice_generation
                  - custom_script
                  - workflow_execution
                  - system_command
              description: Valid automation action types.
            rule_statuses:
              type: array
              items:
                type: string
                enum:
                  - active
                  - inactive
                  - draft
                  - error
              description: Valid automation rule statuses.
            execution_statuses:
              type: array
              items:
                type: string
                enum: *a4
              description: Valid automation execution statuses.
            priority_levels:
              type: array
              items:
                type: string
                enum:
                  - low
                  - normal
                  - high
                  - critical
              description: Valid automation priority levels.
            condition_operators:
              type: array
              items:
                type: string
                enum:
                  - equals
                  - not_equals
                  - greater_than
                  - less_than
                  - greater_than_or_equal
                  - less_than_or_equal
                  - contains
                  - not_contains
                  - starts_with
                  - ends_with
                  - in
                  - not_in
                  - exists
                  - not_exists
                  - regex_match
              description: Valid condition operators.
          required:
            - trigger_types
            - action_types
            - rule_statuses
            - execution_statuses
            - priority_levels
            - condition_operators
      required:
        - data
    AutomationRuleCondition:
      type: object
      properties:
        field:
          type: string
          description: Field path evaluated for this condition.
        operator:
          type: string
          enum:
            - equals
            - not_equals
            - greater_than
            - less_than
            - greater_than_or_equal
            - less_than_or_equal
            - contains
            - not_contains
            - starts_with
            - ends_with
            - in
            - not_in
            - exists
            - not_exists
            - regex_match
        value:
          description: Condition comparison value.
        data_type:
          type: string
          enum:
            - string
            - number
            - boolean
            - date
            - array
            - object
      required:
        - field
        - operator
    AutomationRuleAction:
      type: object
      properties:
        type:
          type: string
          enum: *a5
          description: Automation action type.
        config:
          type: object
          additionalProperties: {}
          description: Action configuration object. Expected keys depend on action type.
        order:
          type: integer
          minimum: 1
          description: Execution order (1-based).
        continue_on_error:
          type: boolean
          description: Continue execution after a failed action.
        timeout_seconds:
          type: integer
          minimum: 1
          description: Optional per-action timeout in seconds.
        retry_attempts:
          type: integer
          minimum: 0
          maximum: 5
          description: Optional retry count for this action.
      required:
        - type
        - config
        - order
    AutomationNotificationSettings:
      type: object
      properties:
        notify_on_success:
          type: boolean
        notify_on_failure:
          type: boolean
        notification_emails:
          type: array
          items:
            type: string
            format: email
        notification_webhooks:
          type: array
          items:
            type: string
            format: uri
    AutomationRule:
      type: object
      properties:
        rule_id:
          type: string
          format: uuid
          description: Rule UUID generated with crypto.randomUUID when a rule is created.
        tenant:
          type: string
          format: uuid
          description: Tenant UUID scoped from API key authentication.
        name:
          type: string
          description: Rule display name.
        description:
          type:
            - string
            - "null"
        status:
          type: string
          enum: *a6
          description: Current automation rule status.
        priority:
          type: string
          enum: *a7
          description: Current automation rule priority.
        trigger_type:
          type: string
          enum: *a3
          description: Trigger type used to start rule execution.
        trigger_config:
          type: object
          additionalProperties: {}
          description: Trigger configuration object stored with the rule.
        conditions:
          type: array
          items:
            $ref: "#/components/schemas/AutomationRuleCondition"
          description: Optional additional rule conditions.
        condition_logic:
          type: string
          enum:
            - and
            - or
          description: Condition combination logic.
        actions:
          type: array
          items:
            $ref: "#/components/schemas/AutomationRuleAction"
          description: Ordered action list for this rule.
        max_concurrent_executions:
          type: integer
          minimum: 1
        execution_timeout_minutes:
          type: integer
          minimum: 1
        retry_failed_executions:
          type: boolean
        is_template:
          type: boolean
        template_category:
          type:
            - string
            - "null"
        tags:
          type: array
          items:
            type: string
        metadata:
          type: object
          additionalProperties: {}
        notification_settings:
          $ref: "#/components/schemas/AutomationNotificationSettings"
        created_by:
          type:
            - string
            - "null"
          format: uuid
          description: User UUID from API key context that created the rule.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        execution_count:
          type: integer
          minimum: 0
        last_executed:
          type:
            - string
            - "null"
          format: date-time
        execution_statistics:
          type: object
          additionalProperties: {}
          description: Included on GET /rules/{id} by service lookup helper.
        _links:
          $ref: "#/components/schemas/AutomationLinks"
      required:
        - rule_id
        - tenant
        - name
        - status
        - priority
        - trigger_type
        - trigger_config
        - actions
    CreateAutomationRuleRequest:
