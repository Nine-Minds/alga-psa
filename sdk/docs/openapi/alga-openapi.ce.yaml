      required:
        - x-webhook-signature
    LicenceCountQuery:
      type: object
      properties:
        tenant_id:
          type: string
          description: Tenant identifier to query. This must match a tenants.tenant record.
      required:
        - tenant_id
    LicenceUsageResponse:
      type: object
      properties:
        tenant_id:
          type: string
          description: Echoed tenant identifier from the request.
        limit:
          type:
            - integer
            - "null"
          description: Licensed internal-user count from tenants.licensed_user_count. Null
            means unlimited.
        used:
          type: integer
          description: Count of active internal users where users.user_type is internal
            and is_inactive is false.
        remaining:
          type:
            - integer
            - "null"
          description: Calculated remaining seats as max(0, limit - used), or null when
            limit is unlimited.
        last_updated:
          type:
            - string
            - "null"
          description: ISO timestamp from tenants.last_license_update, or null if no
            license update has been recorded.
      required:
        - tenant_id
        - limit
        - used
        - remaining
        - last_updated
    LicenceCountUpdateRequest:
      type: object
      properties:
        tenant_id:
          type: string
          description: Tenant identifier from tenants.tenant whose licensed user count
            should be updated.
        license_count:
          type: integer
          minimum: 0
          description: Licensed internal-user count from the Stripe subscription quantity.
        event_id:
          type: string
          description: Stripe webhook event ID. When supplied, the handler uses
            tenants.stripe_event_id for idempotency.
      required:
        - tenant_id
        - license_count
    LicenceCountUpdateResponse:
      type: object
      properties:
        success:
          type: boolean
          enum:
            - true
          description: Indicates the license count update was accepted.
        tenant_id:
          type: string
          description: Echoed tenant identifier that was updated.
        license_count:
          type: integer
          description: Echoed licensed user count that was written.
        updated_at:
          type: string
          format: date-time
          description: ISO timestamp generated by the handler for this response.
      required:
        - success
        - tenant_id
        - license_count
        - updated_at
    LicenceCountErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Human-readable error message.
      required:
        - error
    ChatMessage:
      type: object
      properties:
