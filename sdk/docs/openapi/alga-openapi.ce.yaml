paths:
  /api/auth/google/callback:
    get:
      summary: Handle Google OAuth callback
      description: Browser popup callback for the Gmail email-provider OAuth flow.
        Google redirects here with an authorization code and state. The handler
        decodes the state to find the tenant and email provider, exchanges the
        code for Google access and refresh tokens, stores them on the provider
        configuration, marks the provider connected, and may provision Gmail
        watch/Pub/Sub resources. This endpoint is public and protected by the
        OAuth state parameter; it always responds with text/html that posts the
        success or error payload to the opener window rather than returning
        JSON.
      tags:
        - Auth
      security: []
      parameters:
        - schema:
            type: string
            description: OAuth 2.0 authorization code. Required unless the provider returned
              error.
          required: false
          description: OAuth 2.0 authorization code. Required unless the provider returned
            error.
          name: code
          in: query
        - schema:
            type: string
            description: Base64-encoded JSON state object generated when the OAuth flow was
              initiated. It carries tenant context, providerId, redirectUri,
              timestamp, and nonce values used to complete the callback.
          required: false
          description: Base64-encoded JSON state object generated when the OAuth flow was
            initiated. It carries tenant context, providerId, redirectUri,
            timestamp, and nonce values used to complete the callback.
          name: state
          in: query
        - schema:
            type: string
            description: OAuth error code returned by the provider, such as access_denied.
          required: false
          description: OAuth error code returned by the provider, such as access_denied.
          name: error
          in: query
        - schema:
            type: string
            description: Human-readable OAuth error description returned by the provider.
          required: false
          description: Human-readable OAuth error description returned by the provider.
          name: error_description
          in: query
      responses:
        "200":
          description: HTML popup callback page. The embedded postMessage payload reports
            success, provider=google, token expiry, and echoed code/state, or an
            OAuth/configuration/token-exchange error.
          content:
            text/html:
              schema:
                $ref: "#/components/schemas/OAuthCallbackHtmlResponse"
  /api/auth/microsoft/callback:
    get:
      summary: Handle Microsoft OAuth callback
      description: Browser popup callback for the Microsoft Graph email-provider OAuth
        flow. Microsoft redirects here with an authorization code and state. The
        handler decodes tenant/provider context from state, resolves the tenant
        Microsoft profile credentials, exchanges the code for Microsoft Graph
        tokens, stores them on the email provider, marks the provider connected,
        and best-effort registers a Graph webhook subscription. This endpoint is
        public and protected by the OAuth state parameter; it always responds
        with text/html that posts the success or error payload to the opener
        window rather than returning JSON.
      tags:
        - Auth
      security: []
      parameters:
        - schema:
            type: string
            description: OAuth 2.0 authorization code. Required unless the provider returned
              error.
          required: false
          description: OAuth 2.0 authorization code. Required unless the provider returned
            error.
          name: code
          in: query
        - schema:
            type: string
            description: Base64-encoded JSON state object generated when the OAuth flow was
              initiated. It carries tenant context, providerId, redirectUri,
              timestamp, and nonce values used to complete the callback.
          required: false
          description: Base64-encoded JSON state object generated when the OAuth flow was
            initiated. It carries tenant context, providerId, redirectUri,
            timestamp, and nonce values used to complete the callback.
          name: state
          in: query
        - schema:
            type: string
            description: OAuth error code returned by the provider, such as access_denied.
          required: false
          description: OAuth error code returned by the provider, such as access_denied.
          name: error
          in: query
        - schema:
            type: string
            description: Human-readable OAuth error description returned by the provider.
          required: false
          description: Human-readable OAuth error description returned by the provider.
          name: error_description
          in: query
      responses:
        "200":
          description: HTML popup callback page. The embedded postMessage payload reports
            success, provider=microsoft, token expiry, and echoed code/state, or
            an OAuth/configuration/token-exchange error.
          content:
            text/html:
              schema:
                $ref: "#/components/schemas/OAuthCallbackHtmlResponse"
  /api/auth/{nextauth}:
    get:
      summary: Handle NextAuth GET action
      description: "Catch-all Auth.js/NextAuth GET endpoint. The nextauth path segment
        selects the action: csrf returns a CSRF token and sets the CSRF cookie,
        providers returns configured provider metadata, session returns the
        current session or {}, signin/signout/error/verify-request render or
        redirect to configured pages, and callback/{provider} handles OAuth
        provider redirects. This route is the authentication surface itself and
        does not require API-key authentication."
      tags:
        - Auth
      security: []
      parameters:
        - schema:
            type: string
            description: NextAuth catch-all action path. Common values include csrf,
              providers, signin, signout, session, error, verify-request,
              webauthn-options, callback/credentials, callback/google,
              callback/azure-ad, and callback/keycloak.
          required: true
          description: NextAuth catch-all action path. Common values include csrf,
            providers, signin, signout, session, error, verify-request,
            webauthn-options, callback/credentials, callback/google,
            callback/azure-ad, and callback/keycloak.
          name: nextauth
          in: path
        - schema:
            type: string
            description: Optional URL to redirect to after sign-in or sign-out flows.
          required: false
          description: Optional URL to redirect to after sign-in or sign-out flows.
          name: callbackUrl
          in: query
        - schema:
            type: string
            description: Optional NextAuth/OAuth error code shown by sign-in or error pages.
          required: false
          description: Optional NextAuth/OAuth error code shown by sign-in or error pages.
          name: error
          in: query
        - schema:
            type: string
            description: OAuth authorization code for provider callback sub-routes.
          required: false
          description: OAuth authorization code for provider callback sub-routes.
          name: code
          in: query
        - schema:
            type: string
            description: OAuth state value for provider callback sub-routes.
          required: false
          description: OAuth state value for provider callback sub-routes.
          name: state
          in: query
        - schema:
            type: string
            description: Human-readable provider error description for OAuth callback
              sub-routes.
          required: false
          description: Human-readable provider error description for OAuth callback
            sub-routes.
          name: error_description
          in: query
      responses:
        "200":
          description: Successful JSON or HTML response for the selected NextAuth action.
            Examples include { csrfToken }, provider maps, session objects, {},
            or built-in HTML pages.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NextAuthGetResponse"
        "302":
          description: Redirect to the configured sign-in, sign-out, callback, or error
            destination.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RedirectResponse"
        "404":
          description: No content when a built-in action is unavailable or disabled.
    post:
      summary: Handle NextAuth POST action
      description: "Catch-all Auth.js/NextAuth POST endpoint. The nextauth path
        segment selects the action: callback/credentials authenticates email and
        password credentials, callback/{provider} handles OAuth callback form
        posts, signout clears the current session, session returns or updates
        session data, and csrf returns a CSRF token. Mutating actions require
        the csrfToken body field matching the Auth.js CSRF cookie. Credential
        success sets the encrypted Auth.js session cookie and redirects;
        failures typically redirect to /auth/signin with an error code."
      tags:
        - Auth
      security: []
      parameters:
        - schema:
            type: string
            description: NextAuth catch-all action path. Common values include csrf,
              providers, signin, signout, session, error, verify-request,
              webauthn-options, callback/credentials, callback/google,
              callback/azure-ad, and callback/keycloak.
          required: true
          description: NextAuth catch-all action path. Common values include csrf,
            providers, signin, signout, session, error, verify-request,
            webauthn-options, callback/credentials, callback/google,
            callback/azure-ad, and callback/keycloak.
          name: nextauth
          in: path
      requestBody:
        description: Form fields consumed by the selected NextAuth POST action.
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/NextAuthPostBody"
            description: Form fields consumed by the selected NextAuth POST action.
      responses:
        "200":
          description: JSON response for session or csrf POST actions.
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: "#/components/schemas/AuthSessionAuthenticatedResponse"
                  - $ref: "#/components/schemas/EmptyObjectResponse"
                  - $ref: "#/components/schemas/CsrfTokenResponse"
                  - $ref: "#/components/schemas/EmptyObjectResponse"
        "302":
          description: Redirect after sign-in, OAuth callback, sign-out, or error
            handling. Session cookies may be set or cleared.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RedirectResponse"
  /api/auth/session:
    get:
      summary: Get current Auth.js session
      description: Returns the current Auth.js/NextAuth session by reading the session
        cookie and running the full auth handler, including session revocation
        checks. Authenticated responses include the user profile, tenant
        context, session_id from the sessions table, and login method. If no
        valid session cookie is present, the route still returns HTTP 200 with
        an empty object.
      tags:
        - Auth
      security:
        - SessionCookieAuth: []
      responses:
        "200":
          description: Authenticated session object, or {} when the request is
            unauthenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSessionResponse"
        "500":
          description: Unexpected session retrieval failure.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlatErrorResponse"
  /api/auth/validate-api-key:
    post:
      summary: Validate API key
      description: Validates a plaintext API key supplied in the x-api-key header. The
        key is hashed before lookup. If the api_keys record exists, is active,
        has not expired, and has not exhausted its usage limit, the response
        returns the owning user UUID and tenant from that record. This route is
        the credential validation endpoint itself and does not require a
        separate session, tenant header, or RBAC permission.
      tags:
        - Auth
      security: []
      parameters:
        - schema:
            type: string
            minLength: 1
            description: Plaintext API key to validate. The service hashes this value before
              looking up the api_keys record.
          required: true
          description: Plaintext API key to validate. The service hashes this value before
            looking up the api_keys record.
          name: x-api-key
          in: header
      responses:
        "200":
          description: API key is valid and active.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidateApiKeyResponse"
        "401":
          description: The x-api-key header is missing, or the key is invalid, inactive,
            expired, or usage-exhausted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlatErrorResponse"
        "500":
          description: Unexpected error while validating the API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlatErrorResponse"
  /api/auth/validate-token:
    post:
      summary: Validate session token
      description: "Checks whether the request carries a valid Auth.js session token,
        either in the session cookie or in an Authorization: Bearer header. A
        valid token returns the user type and tenant copied from the session
        JWT. No request body is read."
      tags:
        - Auth
      security:
        - SessionCookieAuth: []
        - BearerAuth: []
      parameters:
        - schema:
            type: string
            description: Optional Bearer token fallback. The route also accepts the Auth.js
              session token cookie.
          required: false
          description: Optional Bearer token fallback. The route also accepts the Auth.js
            session token cookie.
          name: authorization
          in: header
      responses:
        "200":
          description: Session token is valid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidateTokenSuccessResponse"
        "401":
          description: No valid session token was found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidateTokenUnauthorizedResponse"
        "500":
          description: Unexpected token validation error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlatErrorResponse"
  /api/v1/admin/telemetry-settings:
    get:
      summary: Get telemetry settings
      description: Returns tenant admin telemetry status derived from the
        ALGA_USAGE_STATS environment variable. The handler resolves the tenant
        with createTenantKnex, requires an authenticated current user, and
        checks the tenant-scoped users.role value for admin or owner. The route
        does not read or write tenant telemetry settings from the database.
        Because this session-authenticated route is not currently in
        apiKeySkipPaths, API middleware also requires an x-api-key header to be
        present before the handler can run.
      tags:
        - Admin
        - Telemetry
      security:
        - ApiKeyAuth: []
          SessionCookieAuth: []
      extensions:
        x-rbac-roles:
          - admin
          - owner
        x-tenant-scoped: true
        x-controlled-by: ALGA_USAGE_STATS
        x-middleware-api-key-required-currently: true
      responses:
        "200":
          description: Current telemetry setting returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TelemetrySettingsGetResponse"
        "401":
          description: No authenticated current user, no tenant context, or x-api-key
            missing at middleware.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminTelemetryErrorResponse"
        "403":
          description: Authenticated user is not an admin or owner in the tenant.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminTelemetryErrorResponse"
        "500":
          description: Unexpected failure while loading telemetry settings.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminTelemetryErrorResponse"
    post:
      summary: Check telemetry settings update status
      description: No-op endpoint for telemetry settings. The handler authenticates
        the current user, verifies the tenant-scoped users.role is admin or
        owner, ignores the request body, performs no database write, and returns
        the current ALGA_USAGE_STATS-derived status with a message explaining
        that telemetry cannot be changed through the API. Because this
        session-authenticated route is not currently in apiKeySkipPaths, API
        middleware also requires an x-api-key header to be present before the
        handler can run.
      tags:
        - Admin
        - Telemetry
      security:
        - ApiKeyAuth: []
          SessionCookieAuth: []
      extensions:
        x-rbac-roles:
          - admin
          - owner
        x-tenant-scoped: true
        x-controlled-by: ALGA_USAGE_STATS
        x-request-body-ignored: true
        x-runtime-mutation: false
        x-middleware-api-key-required-currently: true
      responses:
        "200":
          description: Telemetry status returned; no setting was changed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TelemetrySettingsPostResponse"
        "401":
          description: No authenticated current user, no tenant context, or x-api-key
            missing at middleware.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminTelemetryErrorResponse"
        "403":
          description: Authenticated user is not an admin or owner in the tenant.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminTelemetryErrorResponse"
        "500":
          description: Unexpected failure while processing the no-op update request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminTelemetryErrorResponse"
  /api/v1/permission-checks:
    post:
      summary: Check user permissions
      description: Checks one or more resource/action pairs for the requested user (or
        current API-key user).
      tags:
