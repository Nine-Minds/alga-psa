  /api/files/{fileId}/download:
    get:
      summary: Download file by ID
      description: Downloads a stored external file as an attachment by
        external_files.file_id. The route is skipped by API-key middleware and
        relies on session/tenant resolution through createTenantKnex and
        StorageService. Storage lookup is tenant-scoped to external_files.tenant
        and is_deleted=false, but the handler performs no explicit per-document
        authorization; any user resolved into the tenant can download a file by
        fileId. The response body is binary and Content-Type is taken from
        stored file metadata.
      tags:
        - Files
      security:
        - SessionCookieAuth: []
      extensions:
        x-api-key-auth-skipped: true
        x-tenant-scoped-storage: true
        x-explicit-document-authorization: false
      parameters:
        - schema:
            type: string
            format: uuid
            description: File UUID from external_files.file_id to download. The handler does
              not validate UUID syntax before querying storage metadata.
          required: true
          description: File UUID from external_files.file_id to download. The handler does
            not validate UUID syntax before querying storage metadata.
          name: fileId
          in: path
      responses:
        "200":
          description: Binary file download with attachment Content-Disposition.
            Content-Type varies by stored MIME type.
          content:
            application/octet-stream:
              schema:
                $ref: "#/components/schemas/FileBinaryDownloadResponse"
        "404":
          description: Tenant could not be resolved by createTenantKnex.
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/FileDownloadPlainTextError"
        "500":
          description: File metadata/storage lookup failed or another download error
            occurred.
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/FileDownloadPlainTextError"
  /api/health:
    get:
      summary: Health check
      description: Simple unauthenticated liveness check for the Next.js API process.
        It performs no database, Redis, or downstream dependency checks and
        returns a fixed status/version payload when the process can serve HTTP
        requests.
      tags:
        - System
      security: []
      extensions:
        x-api-key-auth-skipped: true
        x-dependency-checks: false
      responses:
        "200":
          description: API process is alive and responding.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/healthz:
    get:
      summary: Liveness probe
      description: Kubernetes liveness endpoint. It returns a fixed healthy status
        with timestamp, uptime, version, and environment when the process can
        serve HTTP. It does not check database, Redis, or downstream
        dependencies; use /api/readyz for dependency-aware readiness.
      tags:
        - System
      security: []
      extensions:
        x-api-key-auth-skipped: true
        x-dependency-checks: false
        x-kubernetes-probe: liveness
      responses:
        "200":
          description: Process is alive and serving HTTP.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthzResponse"
  /api/readyz:
    get:
      summary: Readiness probe
      description: Kubernetes readiness endpoint for the Next.js API route. It checks
        database connectivity with SELECT 1 and returns 200 only when critical
        dependencies are available. The Redis check is currently a placeholder
        that mirrors the database result. This endpoint is unauthenticated and
        is explicitly skipped by API-key middleware.
      tags:
        - System
      security: []
      extensions:
        x-api-key-auth-skipped: true
        x-dependency-checks: true
        x-kubernetes-probe: readiness
        x-redis-check-stubbed: true
      responses:
        "200":
          description: All critical dependencies checked by this handler are available.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyzReadyResponse"
        "503":
          description: One or more critical dependencies are unavailable, or a readiness
            check threw an exception.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyzNotReadyResponse"
  /api/installs/lookup-by-host:
    get:
      summary: Lookup extension install by runner host
      description: Internal endpoint for extension runners. Given a runner domain,
        resolves the tenant, extension registry ID, and current bundle content
        hash needed to serve extension content. The EE implementation queries
        tenant_extension_install.runner_domain with an admin connection and then
        selects the latest extension_bundle row for the installed version. In
        non-EE builds the product-extension action is a stub. Requires
        x-api-key; the Express middleware allows the ALGA_AUTH_KEY runner secret
        or a valid database API key.
      tags:
        - Extension Installs
      security:
        - ApiKeyAuth: []
      extensions:
        x-runner-internal: true
        x-admin-db-connection: true
        x-cache-control: no-store
        x-vary: x-api-key, x-canary
      parameters:
        - schema:
            type: string
            minLength: 1
            description: Runner domain hostname to resolve. The implementation lowercases
              the value and strips any port before matching
              tenant_extension_install.runner_domain.
          required: true
          description: Runner domain hostname to resolve. The implementation lowercases
            the value and strips any port before matching
            tenant_extension_install.runner_domain.
          name: host
          in: query
        - schema:
            type: string
            description: Optional runner canary identifier used only for logging and cache
              variance.
          required: false
          description: Optional runner canary identifier used only for logging and cache
            variance.
          name: x-canary
          in: header
      responses:
        "200":
          description: Install mapping found for the runner host.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstallLookupByHostResponse"
        "400":
          description: The required host query parameter is missing.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstallLookupErrorResponse"
        "401":
          description: x-api-key is missing or invalid at middleware.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstallLookupErrorResponse"
        "404":
          description: No install or bundle was found for the runner host.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstallLookupErrorResponse"
        "500":
          description: Unexpected lookup failure.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstallLookupErrorResponse"
  /api/installs/validate:
    get:
      summary: Validate extension bundle content hash
      description: Internal endpoint for extension runners and deployment validation.
        It checks whether a supplied content hash belongs to the currently
        installed extension version for the supplied tenant and extension
        registry ID. The EE action uses an admin database connection, reads
        tenant_extension_install by tenant_id and registry_id, and checks
        extension_bundle for a matching version_id and content_hash. A negative
        validation result is returned as 200 with valid=false, not as 404.
        Requires x-api-key; the Express middleware allows the ALGA_AUTH_KEY
        runner secret or a valid database API key.
      tags:
        - Extension Installs
      security:
        - ApiKeyAuth: []
      extensions:
        x-runner-internal: true
        x-admin-db-connection: true
        x-cache-control: no-store
        x-vary: x-api-key, x-canary
      parameters:
        - schema:
            type: string
            format: uuid
            description: Tenant UUID from tenant_extension_install.tenant_id.
          required: true
          description: Tenant UUID from tenant_extension_install.tenant_id.
          name: tenant
          in: query
        - schema:
            type: string
            format: uuid
            description: Extension registry UUID from tenant_extension_install.registry_id.
          required: true
          description: Extension registry UUID from tenant_extension_install.registry_id.
          name: extension
          in: query
        - schema:
            type: string
            minLength: 1
            description: "Bundle content hash to validate. The EE action accepts sha256:<64
              hex chars> or a raw 64-character hex string and normalizes raw hex
              to sha256: form."
          required: true
          description: "Bundle content hash to validate. The EE action accepts sha256:<64
            hex chars> or a raw 64-character hex string and normalizes raw hex
            to sha256: form."
          name: hash
          in: query
        - schema:
            type: string
            description: Optional runner canary identifier used only for logging and cache
              variance.
          required: false
          description: Optional runner canary identifier used only for logging and cache
            variance.
          name: x-canary
          in: header
      responses:
        "200":
          description: Validation completed. valid=false means the hash did not match, the
            install was not found, or the hash format was invalid at the action
            layer.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstallValidateResponse"
        "400":
          description: Required tenant, extension, or hash query parameter is missing.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstallValidateParameterErrorResponse"
        "401":
          description: x-api-key is missing or invalid at middleware.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstallLookupErrorResponse"
        "500":
          description: Unexpected validation failure. The EE handler returns valid=false
            for internal exceptions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstallValidateResponse"
  /api/integrations/qbo/status:
    get:
      summary: QuickBooks Online status route unavailable
      description: This path appears in the generated route inventory, but
        server/src/app/api/integrations/qbo/status/route.ts is not present in
        the current worktree. Without an x-api-key, API middleware returns 401
        before routing. With the middleware requirement satisfied, Next.js has
        no handler for this path and returns the framework not-found response.
        QuickBooks connection status is currently exposed through server actions
        such as getQboConnectionStatus and through versioned QuickBooks API
        routes, not this inventory-only path.
      deprecated: true
      tags:
        - Integrations - QuickBooks
      security:
        - ApiKeyAuth: []
      extensions:
        x-route-inventory-only: true
        x-route-file-missing: server/src/app/api/integrations/qbo/status/route.ts
        x-oauth-provider: quickbooks-online
      responses:
        "401":
          description: x-api-key is missing at middleware before routing.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QboErrorResponse"
        "404":
          description: No route handler exists for this inventory-only path in the current
            worktree.
