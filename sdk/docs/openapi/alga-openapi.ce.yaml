openapi: 3.1.0
info:
  title: Alga PSA API
  version: 0.1.0
  description: OpenAPI specification generated from registered route metadata.
servers:
  - url: https://algapsa.com
    description: Production
  - url: http://localhost:3000
    description: Local development
tags:
  - name: Access Control & Users v1
  - name: Admin
  - name: Assets
  - name: Auth
  - name: Automation
  - name: Billing
  - name: Billing Analytics
  - name: Boards
  - name: Categories
  - name: Chat
  - name: Client Contract Lines
  - name: Clients
  - name: Contacts
  - name: Contract Lines
  - name: Documents
  - name: Email
  - name: Extension Gateway
  - name: Extension Installs
  - name: Files
  - name: Financial
  - name: Integrations - QuickBooks
  - name: Invoices
  - name: Meta & Utility v1
  - name: Products
  - name: Projects
  - name: QuickBooks v1
  - name: Quotes & Contracts v1
  - name: Service Catalog
  - name: Service Categories
  - name: Service Types
  - name: Services
  - name: SoftwareOne Extensions
  - name: Statuses
  - name: Storage
  - name: System
  - name: Telemetry
  - name: Ticket Categories
  - name: Webhooks
  - name: Work Management v1
  - name: Workflows v1
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Auth.js JWE session token
    SessionCookieAuth:
      type: apiKey
      in: cookie
      name: authjs.session-token
      description: Auth.js session cookie. In secure production deployments the cookie
        may be named __Secure-authjs.session-token; in local development it may
        include a port suffix.
    WebhookSignatureAuth:
      type: apiKey
      in: header
      name: x-webhook-signature
      description: HMAC-SHA256 signature generated with ALGA_WEBHOOK_SECRET. POST
        signs the raw JSON body. GET signs the string GET:<tenant_id>.
    GooglePubSubJWT:
      type: http
      scheme: bearer
      bearerFormat: Google Pub/Sub JWT
      description: Google-signed JWT from Pub/Sub push. The webhook validates the
        audience against the webhook URL and checks the issuer/service account
        against tenant Google configuration.
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details: {}
          required:
            - code
            - message
      required:
        - error
    PlaceholderObject:
      type: object
      properties: {}
    OAuthCallbackHtmlResponse:
      type: string
      description: HTML popup callback page. The page posts a JSON oauth-callback
        message to window.opener or window.parent via postMessage, then attempts
        to close itself.
    OAuthCallbackQuery:
      type: object
      properties:
        code:
          type: string
          description: OAuth 2.0 authorization code. Required unless the provider returned
            error.
        state:
          type: string
          description: Base64-encoded JSON state object generated when the OAuth flow was
            initiated. It carries tenant context, providerId, redirectUri,
            timestamp, and nonce values used to complete the callback.
        error:
          type: string
          description: OAuth error code returned by the provider, such as access_denied.
        error_description:
          type: string
          description: Human-readable OAuth error description returned by the provider.
    AuthSessionUser:
      type: object
      properties:
        id:
          type: string
          description: User identifier from the users.user_id record.
        email:
          type: string
          format: email
          description: User's email address.
        name:
          type: string
          description: User's display name, usually first_name plus last_name.
        username:
          type: string
          description: User's login username.
        image:
          type: string
          description: Avatar or profile image URL.
        proToken:
          type: string
          description: Legacy Pro token value when present.
        tenant:
          type: string
          description: Tenant UUID from the user session JWT.
        tenantSlug:
          type: string
          description: URL-safe tenant slug for portal routing.
        user_type:
          type: string
          enum:
            - client
            - internal
          description: User classification from users.user_type.
        clientId:
          type: string
          format: uuid
          description: Client UUID from contacts.client_id for client-portal users.
        contactId:
          type: string
          format: uuid
          description: Contact UUID from users.contact_id for client-portal users.
        plan:
          type: string
          description: Current tenant billing plan key.
        addons:
          type: array
          items:
            type: string
          description: Enabled tenant add-on keys.
        trial_end:
          type:
            - string
            - "null"
          description: Trial expiry timestamp when present.
        subscription_status:
          type:
            - string
            - "null"
          enum:
            - active
            - trialing
            - past_due
            - unpaid
          description: Billing subscription status copied into the session token.
        solo_pro_trial_end:
          type:
            - string
            - "null"
          description: Solo Pro trial expiry timestamp when present.
        premium_trial_end:
          type:
            - string
            - "null"
          description: Premium trial expiry timestamp when present.
        premium_trial_confirmed:
          type: boolean
          description: Whether the user confirmed the Premium trial.
        premium_trial_effective_date:
          type:
            - string
            - "null"
          description: Premium trial effective date when present.
      required:
        - id
        - email
        - name
        - username
    AuthSessionAuthenticatedResponse:
      type: object
      properties:
        session_id:
          type: string
          format: uuid
          description: Current session UUID from the sessions table, created at sign-in.
        login_method:
          type: string
          description: Authentication method used for this session, such as credentials,
            google, or azure-ad.
        user:
          $ref: "#/components/schemas/AuthSessionUser"
      required:
        - user
    EmptyObjectResponse:
      type: object
      properties: {}
      additionalProperties: false
      description: Empty object returned when no authenticated session is present.
    AuthSessionResponse:
      anyOf:
        - $ref: "#/components/schemas/AuthSessionAuthenticatedResponse"
        - $ref: "#/components/schemas/EmptyObjectResponse"
      description: Authenticated session data, or an empty object when the request has
        no valid session cookie.
    FlatErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Human-readable error message.
      required:
        - error
    ValidateApiKeyHeaders:
      type: object
      properties:
        x-api-key:
          type: string
          minLength: 1
          description: Plaintext API key to validate. The service hashes this value before
            looking up the api_keys record.
      required:
        - x-api-key
    ValidateApiKeyResponse:
      type: object
      properties:
        isValid:
          type: boolean
          enum:
            - true
          description: Indicates that the API key is active and valid.
        userId:
          type: string
          format: uuid
          description: UUID of the user who owns the API key, from api_keys.user_id.
        tenant:
          type: string
          description: Tenant identifier scoped to this API key, from api_keys.tenant.
      required:
        - isValid
        - userId
        - tenant
    ValidateTokenHeaders:
      type: object
      properties:
        authorization:
          type: string
          description: Optional Bearer token fallback. The route also accepts the Auth.js
            session token cookie.
    ValidateTokenSuccessResponse:
      type: object
      properties:
        isValid:
          type: boolean
          enum:
            - true
          description: Indicates that the request contains a valid Auth.js session token.
        userType:
          type: string
          enum:
            - internal
            - client
          description: User classification from users.user_type in the session JWT.
        tenant:
          type: string
          description: Tenant identifier from the session JWT.
      required:
        - isValid
        - userType
        - tenant
    ValidateTokenUnauthorizedResponse:
      type: object
      properties:
        isValid:
          type: boolean
          enum:
            - false
          description: No valid session token was found.
      required:
        - isValid
    NextAuthCatchAllParams:
      type: object
      properties:
        nextauth:
          type: string
          description: NextAuth catch-all action path. Common values include csrf,
            providers, signin, signout, session, error, verify-request,
            webauthn-options, callback/credentials, callback/google,
            callback/azure-ad, and callback/keycloak.
      required:
        - nextauth
    NextAuthGetQuery:
      type: object
      properties:
        callbackUrl:
          type: string
          description: Optional URL to redirect to after sign-in or sign-out flows.
        error:
          type: string
          description: Optional NextAuth/OAuth error code shown by sign-in or error pages.
        code:
          type: string
          description: OAuth authorization code for provider callback sub-routes.
        state:
          type: string
          description: OAuth state value for provider callback sub-routes.
        error_description:
          type: string
          description: Human-readable provider error description for OAuth callback
            sub-routes.
    CsrfTokenResponse:
      type: object
      properties:
        csrfToken:
          type: string
          description: Opaque double-submit CSRF token required for mutating NextAuth POST
            actions.
      required:
        - csrfToken
    ProviderInfo:
      type: object
      properties:
        id:
          type: string
          description: Provider identifier such as credentials, google, azure-ad, or
            keycloak.
        name:
          type: string
          description: Provider display name.
        type:
          type: string
          enum:
            - oauth
            - oidc
            - credentials
            - email
            - webauthn
          description: NextAuth provider type.
        signinUrl:
          type: string
          description: URL used to initiate sign-in with this provider.
        callbackUrl:
          type: string
          description: URL the provider redirects to after authentication.
      required:
        - id
        - name
        - type
        - signinUrl
        - callbackUrl
    AuthProvidersResponse:
      type: object
      additionalProperties:
        $ref: "#/components/schemas/ProviderInfo"
      description: Map of configured providers keyed by provider ID.
    NextAuthGetResponse:
      anyOf:
        - $ref: "#/components/schemas/AuthSessionAuthenticatedResponse"
        - $ref: "#/components/schemas/EmptyObjectResponse"
        - $ref: "#/components/schemas/CsrfTokenResponse"
        - $ref: "#/components/schemas/AuthProvidersResponse"
        - $ref: "#/components/schemas/OAuthCallbackHtmlResponse"
        - $ref: "#/components/schemas/EmptyObjectResponse"
      description: "Representative successful GET response for the NextAuth catch-all
        route. The exact payload depends on the nextauth action: session returns
        a session object or {}, csrf returns csrfToken, providers returns a
        provider map, and page actions return HTML or redirects."
    NextAuthPostBody:
      type: object
      properties:
        email:
          type: string
          format: email
          description: Credentials-provider email address for callback/credentials.
        password:
          type: string
          description: Credentials-provider plaintext password for callback/credentials.
        twoFactorCode:
          type: string
          description: TOTP code required when two-factor authentication is enabled and
            the device is not trusted.
        userType:
          type: string
          enum:
            - client
            - internal
          description: Optional user type used to scope credentials-provider lookup.
        tenant:
          type: string
          description: Optional tenant slug used to resolve the tenant for
            credentials-provider login.
        csrfToken:
          type: string
          description: CSRF token from GET /api/auth/csrf. Required for sign-in, sign-out,
            and other mutating NextAuth actions.
        callbackUrl:
          type: string
          description: Post-authentication redirect URL.
        redirect:
          type: string
          description: NextAuth redirect mode flag.
        json:
          type: string
          description: NextAuth JSON response mode flag.
        code:
          type: string
          description: OAuth authorization code for provider callback actions.
        state:
          type: string
          description: OAuth state value for provider callback actions.
        error:
          type: string
          description: Provider OAuth error code for callback actions.
        error_description:
          type: string
          description: Provider OAuth error description for callback actions.
    RedirectResponse:
      type: string
      description: HTTP redirect response. NextAuth sets or clears cookies depending
        on the action.
    TelemetrySettingsGetResponse:
      type: object
      properties:
        usageStatsEnabled:
          type: boolean
          description: Whether usage statistics are enabled by the ALGA_USAGE_STATS
            environment variable.
        environmentVariable:
          type: string
          enum:
            - ALGA_USAGE_STATS
          description: Environment variable controlling telemetry collection.
        currentValue:
          type: string
          description: Raw ALGA_USAGE_STATS environment value, or not set when absent.
        controlledBy:
          type: string
          enum:
            - environment
          description: Telemetry is controlled by process environment, not runtime API
            writes.
        message:
          type: string
          description: Human-readable explanation of the current telemetry setting.
      required:
        - usageStatsEnabled
        - environmentVariable
        - currentValue
        - controlledBy
        - message
    TelemetrySettingsPostResponse:
      type: object
      properties:
        usageStatsEnabled:
          type: boolean
          description: Whether usage statistics are enabled by the ALGA_USAGE_STATS
            environment variable.
        controlledBy:
          type: string
          enum:
            - environment
          description: Telemetry is controlled by process environment, not runtime API
            writes.
        message:
          type: string
          description: Explains that telemetry settings cannot be changed through this API.
      required:
        - usageStatsEnabled
        - controlledBy
        - message
    AdminTelemetryErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Error message such as Authentication required, Insufficient
            permissions, or the handler failure message.
      required:
        - error
    AccessUserIdParamV1:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: User UUID from users.user_id.
      required:
        - id
    AccessRoleIdParamV1:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Role UUID from roles.role_id.
      required:
        - id
    AccessTeamIdParamV1:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Team UUID from teams.team_id.
      required:
        - id
    AccessTeamMemberParamsV1:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Team UUID from teams.team_id.
        userId:
          type: string
          format: uuid
          description: User UUID from users.user_id.
      required:
        - id
        - userId
    AccessTeamPermissionParamsV1:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Team UUID from teams.team_id.
        permissionId:
          type: string
          format: uuid
          description: Permission UUID from permissions.permission_id.
      required:
        - id
        - permissionId
    AccessUserTeamParamsV1:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: User UUID from users.user_id.
        teamId:
          type: string
          format: uuid
          description: Team UUID from teams.team_id.
      required:
        - id
        - teamId
    AccessPermissionIdParamV1:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Permission UUID from permissions.permission_id.
      required:
        - id
    AccessUserListQueryV1:
      type: object
      properties:
        page:
          type: string
        limit:
          type: string
        sort:
          type: string
        order:
          type: string
          enum: &a26
            - asc
            - desc
        username:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
        user_type:
          type: string
          enum: &a27
            - internal
            - client
            - admin
            - contractor
        role_id:
          type: string
          format: uuid
        team_id:
          type: string
          format: uuid
        is_inactive:
          type: string
          enum: &a28
            - "true"
            - "false"
        include_permissions:
          type: string
          enum: &a29
            - "true"
            - "false"
        include_teams:
          type: string
          enum: &a30
            - "true"
            - "false"
        fields:
          type: string
    AccessUserSearchQueryV1:
      type: object
      properties:
        query:
          type: string
        fields:
          type: string
          description: Controller query parser sends strings; schema expects an array of
            field names.
        user_type:
          type: string
          enum: &a31
            - internal
            - client
            - admin
            - contractor
        role_id:
          type: string
          format: uuid
        team_id:
          type: string
          format: uuid
        include_inactive:
          type: string
          enum: &a32
            - "true"
            - "false"
        limit:
          type: string
      required:
        - query
    AccessUserActivityQueryV1:
      type: object
      properties:
        page:
          type: string
        limit:
          type: string
        from_date:
          type: string
        to_date:
          type: string
        activity_type:
          type: string
          description: Controller converts single query value to one-element array for
            service filter.
        ip_address:
          type: string
    AccessUserRolesListQueryV1:
      type: object
      properties:
        page:
          type: string
        limit:
          type: string
        search:
          type: string
        is_inactive:
          type: string
          enum: &a24
            - "true"
            - "false"
        sort:
          type: string
        order:
          type: string
          enum: &a25
            - asc
            - desc
    AccessRoleListQueryV1:
      type: object
      properties:
        page:
          type: string
        limit:
          type: string
        sort:
          type: string
        order:
          type: string
          enum: &a17
            - asc
            - desc
        role_name:
          type: string
        has_permissions:
          type: string
          enum: &a18
            - "true"
            - "false"
        permission_resource:
          type: string
        permission_action:
          type: string
        is_template:
          type: string
          enum: &a19
            - "true"
            - "false"
    AccessPermissionListQueryV1:
      type: object
      properties:
        page:
          type: string
        limit:
          type: string
        sort:
          type: string
        order:
          type: string
          enum: &a16
            - asc
            - desc
        resource:
          type: string
        action:
          type: string
    AccessTeamListQueryV1:
      type: object
      properties:
        page:
          type: string
        limit:
          type: string
        sort:
          type: string
        order:
          type: string
          enum: &a20
            - asc
            - desc
        team_name:
          type: string
        manager_id:
          type: string
          format: uuid
        fields:
          type: string
    AccessTeamSearchQueryV1:
      type: object
      properties:
        query:
          type: string
        page:
          type: string
        limit:
          type: string
        manager_id:
          type: string
          format: uuid
        has_manager:
          type: string
          enum: &a21
            - "true"
            - "false"
        sort:
          type: string
        order:
          type: string
          enum: &a22
            - asc
            - desc
    AccessTeamAnalyticsQueryV1:
      type: object
      properties:
        start_date:
          type: string
        end_date:
          type: string
        include_metrics:
          type: string
          description: Controller query parser provides strings; schema expects metric
            array.
        granularity:
          type: string
          enum: &a23
            - daily
            - weekly
            - monthly
    AccessCreateUserBodyV1:
      type: object
      properties:
        username:
          type: string
          minLength: 3
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        first_name:
          type: string
        last_name:
          type: string
        phone:
          type: string
        timezone:
          type: string
        user_type:
          type: string
          enum: &a1
            - internal
            - client
            - admin
            - contractor
        contact_id:
          type: string
          format: uuid
        two_factor_enabled:
          type: boolean
        is_google_user:
          type: boolean
        is_inactive:
          type: boolean
        role_ids:
          type: array
          items:
            type: string
            format: uuid
      required:
        - username
        - email
        - password
    AccessUpdateUserBodyV1:
      type: object
      properties:
        username:
          type: string
          minLength: 3
        email:
          type: string
          format: email
        first_name:
          type: string
        last_name:
          type: string
        phone:
          type: string
        timezone:
          type: string
        user_type:
          type: string
          enum: *a1
        contact_id:
          type: string
          format: uuid
        two_factor_enabled:
          type: boolean
        is_google_user:
          type: boolean
        is_inactive:
          type: boolean
        role_ids:
          type: array
          items:
            type: string
            format: uuid
    AccessChangePasswordBodyV1:
      type: object
      properties:
        current_password:
          type: string
        new_password:
          type: string
          minLength: 8
        confirm_password:
          type: string
      required:
        - new_password
        - confirm_password
    AccessUserRoleIdsBodyV1:
      type: object
      properties:
        role_ids:
          type: array
          items:
            type: string
            format: uuid
          minItems: 1
      required:
        - role_ids
    AccessUserPreferenceBodyV1:
      type: object
      additionalProperties: {}
      description: Controller forwards request body directly to
        UserService.updateUserPreferences().
    AccessEnable2FABodyV1:
      type: object
      properties:
        secret:
          type: string
        token:
          type: string
      required:
        - secret
        - token
    AccessCreateRoleBodyV1:
      type: object
      properties:
        role_name:
          type: string
        description:
          type: string
        permissions:
          type: array
          items:
            type: string
            format: uuid
        copy_from_role_id:
          type: string
          format: uuid
        is_template:
          type: boolean
      required:
        - role_name
    AccessUpdateRoleBodyV1:
      type: object
      properties:
        role_name:
          type: string
        description:
          type: string
        permissions:
          type: array
          items:
            type: string
            format: uuid
        is_template:
          type: boolean
    AccessRoleCloneBodyV1:
      type: object
      properties:
        new_role_name:
          type: string
        new_description:
          type: string
        copy_permissions:
          type: boolean
        copy_user_assignments:
          type: boolean
      required:
        - new_role_name
    AccessRolePermissionsBodyV1:
      type: object
      properties:
        permission_ids:
          type: array
          items:
            type: string
            format: uuid
          minItems: 1
      required:
        - permission_ids
    AccessBulkRolesBodyV1:
      type: object
      properties:
        roles:
          type: array
          items:
            $ref: "#/components/schemas/AccessCreateRoleBodyV1"
          minItems: 1
      required:
        - roles
    AccessCreatePermissionBodyV1:
      type: object
      properties:
        resource:
          type: string
        action:
          type: string
        description:
          type: string
      required:
        - resource
        - action
    AccessUpdatePermissionBodyV1:
      type: object
      properties:
        resource:
          type: string
        action:
          type: string
        description:
          type: string
    AccessPermissionChecksBodyV1:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
        permissions:
          type: array
          items:
            type: object
            properties:
              resource:
                type: string
              action:
                type: string
            required:
              - resource
              - action
          minItems: 1
      required:
        - permissions
    AccessCreateTeamBodyV1:
      type: object
      properties:
        team_name:
          type: string
        manager_id:
          type: string
          format: uuid
        members:
          type: array
          items:
            type: object
            additionalProperties: {}
      required:
        - team_name
    AccessUpdateTeamBodyV1:
      type: object
      properties:
        team_name:
          type: string
        manager_id:
          type: string
          format: uuid
        members:
          type: array
          items:
            type: object
            additionalProperties: {}
    AccessAddTeamMemberBodyV1:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
      required:
        - user_id
    AccessBulkAddTeamMembersBodyV1:
      type: object
      properties:
        user_ids:
          type: array
          items:
            type: string
            format: uuid
          minItems: 1
      required:
        - user_ids
    AccessAssignTeamManagerBodyV1:
      type: object
