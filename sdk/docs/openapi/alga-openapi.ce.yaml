  /api/v1/billing-analytics/overview:
    get:
      summary: Get billing overview analytics
      description: Maps to ApiContractLineController.getBillingOverviewAnalytics().
        The method requires request context via requireRequestContext(req), but
        this route does not authenticate/set req.context in the handler. Current
        behavior can fail with 500 "Request context not available" when
        middleware has not injected context.
      tags:
        - Billing Analytics
      security:
        - ApiKeyAuth: []
      extensions:
        x-tenant-scoped: true
        x-auth-source: middleware API-key presence check only
        x-request-context-required: true
        x-request-context-wiring-gap: true
      responses:
        "200":
          description: Billing analytics payload returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingOverviewResponse"
        "500":
          description: Request context missing or other server failure.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinancialInvoiceApiError"
  /api/v1/financial/billing/calculate:
    post:
      summary: Calculate client billing charges
      description: Calculates billing for one client and billing window using
        FinancialService.calculateBilling(). Requires financial:read permission.
      tags:
        - Financial
      security:
        - ApiKeyAuth: []
      extensions:
        x-tenant-scoped: true
        x-auth-mechanism: x-api-key header validated in ApiBaseController.authenticate()
        x-tenant-header: x-tenant-id (optional; otherwise tenant inferred from key)
        x-rbac-resource: financial
        x-rbac-action: read
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FinancialCalculateBillingBody"
      responses:
        "200":
          description: Billing calculation returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinancialInvoiceApiSuccess"
        "400":
          description: Invalid billing calculation payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinancialInvoiceApiError"
        "401":
          description: API key missing/invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinancialInvoiceApiError"
        "403":
          description: financial:read permission denied.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinancialInvoiceApiError"
        "500":
          description: Unexpected billing calculation failure.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinancialInvoiceApiError"
