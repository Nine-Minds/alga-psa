          description: Automation execution rows. Current service code wraps the DB result
            array in another array; this schema documents the intended flat
            shape returned by createPaginatedResponse.
        pagination:
          $ref: "#/components/schemas/AutomationPagination"
        meta:
          type: object
          properties:
            filters:
              type: object
              additionalProperties: {}
              description: Validated filters echoed by the controller.
            resource:
              type: string
              enum:
                - automation_execution
              description: Resource name supplied by the controller.
