        content:
          type: string
          description: Message text sent to the chat model.
      required:
        - role
        - content
    ChatStreamRequest:
      type: object
      properties:
        inputs:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
          minItems: 1
          description: Conversation messages in order. These are passed to the OpenRouter
            chat model.
        options:
          type: object
          additionalProperties: {}
          description: Optional model options. Currently declared by the internal
            interface but not consumed by the handler.
        model:
          type: string
          description: Optional model override. Currently ignored; the server uses
            OPENROUTER_CHAT_MODEL or minimax/minimax-m2.
        meta:
          type: object
          properties:
            authorization:
              type: string
              description: Optional downstream authorization token. Currently declared but not
                consumed by the handler.
          description: Optional metadata for legacy chat clients.
      required:
        - inputs
    ChatTitleStreamRequest:
      type: object
      properties:
        inputs:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
          minItems: 1
          description: Conversation messages used as context for generating a short chat
            title.
      required:
        - inputs
    ChatStreamEvent:
      type: object
      properties:
        content:
          type: string
          description: SSE data payload content. Normal events contain generated text;
            terminal events may contain [DONE].
        type:
          type: string
          enum:
            - text
            - error
          description: Event type. text carries model output; error carries an in-stream
            error message.
      required:
        - content
    ChatStreamError:
      type: object
      properties:
        error:
          type: string
          description: Human-readable error message.
      required:
