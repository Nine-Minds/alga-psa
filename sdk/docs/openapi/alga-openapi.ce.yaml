            application/json:
              schema:
                $ref: "#/components/schemas/EmailErrorResponse"
  /api/email/webhooks/google:
    options:
      summary: CORS preflight for Google email webhook
      description: CORS preflight response for the Gmail Pub/Sub webhook endpoint.
        This is handled by global middleware before route authentication or
        business logic. It does not require a session, API key, tenant, JWT,
        request body, or query parameter, and always returns 204 No Content with
        CORS headers.
      tags:
        - Email
      security: []
      extensions:
        x-cors-preflight: true
        x-handled-by: middleware
      responses:
        "204":
          description: CORS preflight accepted; response body is empty.
    post:
      summary: Receive Google Gmail Pub/Sub webhook
      description: "Receives Google Pub/Sub push notifications for Gmail watches.
        Standard session and API-key middleware are bypassed; the handler
        requires an Authorization: Bearer Google-signed JWT, decodes the Pub/Sub
        message data into a Gmail notification with emailAddress and historyId,
        resolves the tenant and email provider by subscription name or mailbox,
        validates Google configuration, and enqueues a pointer-only job into the
        unified inbound email queue. It does not fetch or return email content."
      tags:
        - Email
      security:
        - GooglePubSubJWT: []
      extensions:
        x-api-key-auth-skipped: true
        x-session-auth-skipped: true
        x-webhook-provider: google-pubsub
      requestBody:
        description: Google Pub/Sub push message containing a base64-encoded Gmail
          notification.
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GooglePubSubPushBody"
            description: Google Pub/Sub push message containing a base64-encoded Gmail
              notification.
      responses:
        "200":
          description: Webhook accepted. Either a queue job was enqueued, or the
            notification was safely skipped.
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: "#/components/schemas/GoogleWebhookEnqueueResponse"
                  - $ref: "#/components/schemas/GoogleWebhookSkippedResponse"
        "400":
          description: Permanent parse or validation error; Pub/Sub should not retry.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailErrorResponse"
        "401":
          description: Bearer JWT is missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailErrorResponse"
        "503":
          description: Transient enqueue or processing failure; Pub/Sub may retry.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailErrorResponse"
