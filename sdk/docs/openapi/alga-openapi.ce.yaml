      description: Retries a failed automation execution. The controller authenticates
        with x-api-key, requires automation:execute permission, validates the
        execution UUID, resets a failed execution to pending, clears
        completion/error counters, queues the execution, publishes
        automation.execution.retried, and returns the updated execution with
        links. The service only allows status=failed; missing executions and
        non-failed executions currently throw generic Errors and may surface as
        500 rather than 404 or 400. The queueExecution helper is currently a
        stub.
