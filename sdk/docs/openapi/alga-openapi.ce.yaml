        x-rbac-resource: permission
        x-rbac-action: read
        x-auth-mechanism: x-api-key validated in ApiBaseController.authenticate() or
          equivalent controller-specific auth path
        x-tenant-header: x-tenant-id (optional; inferred from API key when omitted)
        x-controller-handler: listPermissions
      parameters:
