          required: false
          name: limit
          in: query
        - schema:
            type: string
          required: false
          name: sort
          in: query
        - schema:
            type: string
            enum: *a16
          required: false
          name: order
          in: query
        - schema:
            type: string
          required: false
          name: resource
          in: query
