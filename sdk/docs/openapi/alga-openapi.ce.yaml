        timestamp:
          type: string
          format: date-time
          description: ISO timestamp generated when the liveness check is handled.
        uptime:
          type: number
          minimum: 0
          description: Process uptime in seconds from process.uptime().
        version:
          type: string
          description: Application version from the environment/package metadata, with a
            fallback in the handler.
