  /api/v1/assets:
    get:
      summary: List assets
      description: Lists assets for the authenticated tenant with pagination, sorting,
        and asset filters. The controller validates query parameters with
        assetListQuerySchema, calls requireRequestContext, queries assets
        filtered by assets.tenant, joins clients for client_name, computes
        warranty_status, and adds HATEOAS links from asset_id. In the current
        route wiring, the edge middleware only checks x-api-key presence and the
        route is not wrapped with withApiKeyAuth or ApiBaseController
        authentication, so req.context may be absent and produce a 500
        INTERNAL_ERROR before the intended tenant-scoped list can run.
      tags:
        - Assets
      security:
        - ApiKeyAuth: []
      extensions:
        x-tenant-scoped: true
        x-request-context-required: true
        x-current-auth-wiring-missing: true
        x-rbac-resource: asset
        x-rbac-action: read
        x-unapplied-validated-filters:
          - maintenance_due
          - is_active
          - search
          - created_from
          - created_to
          - updated_from
          - updated_to
      parameters:
        - schema:
            type: string
            description: Page number as a query string. Defaults to 1 after validation.
          required: false
          description: Page number as a query string. Defaults to 1 after validation.
          name: page
          in: query
        - schema:
            type: string
            description: Page size as a query string. Must parse to 1 through 100; defaults
              to 25.
          required: false
          description: Page size as a query string. Must parse to 1 through 100; defaults
            to 25.
          name: limit
          in: query
        - schema:
            type: string
            description: Sort column. Defaults to created_at.
          required: false
          description: Sort column. Defaults to created_at.
          name: sort
          in: query
        - schema:
            type: string
            enum: *a33
            description: Sort direction. Defaults to desc.
          required: false
          description: Sort direction. Defaults to desc.
          name: order
          in: query
        - schema:
            type: string
            description: General search filter accepted by the shared filter schema. The
              current AssetService.list implementation does not apply this
              filter.
          required: false
          description: General search filter accepted by the shared filter schema. The
            current AssetService.list implementation does not apply this filter.
          name: search
          in: query
        - schema:
            type: string
            format: date-time
            description: Accepted by validation, but not currently applied by
              AssetService.list.
          required: false
          description: Accepted by validation, but not currently applied by
            AssetService.list.
          name: created_from
          in: query
        - schema:
            type: string
            format: date-time
            description: Accepted by validation, but not currently applied by
