openapi: 3.1.0
info:
  title: Alga PSA API
  version: 0.1.0
  description: OpenAPI specification generated from registered route metadata.
servers:
  - url: https://algapsa.com
    description: Production
  - url: http://localhost:3000
    description: Local development
tags:
  - name: Auth
  - name: Billing
  - name: Boards
  - name: Chat
  - name: Documents
  - name: Email
  - name: Extension Gateway
  - name: Files
  - name: Products
  - name: Projects
  - name: Service Catalog
  - name: Service Categories
  - name: Service Types
  - name: Services
  - name: SoftwareOne Extensions
  - name: Statuses
  - name: Storage
  - name: System
  - name: admin
  - name: assets
  - name: automation
  - name: billing-analytics
  - name: categories
  - name: client-contract-lines
  - name: clients
  - name: contacts
  - name: contract-line-templates
  - name: contract-lines
  - name: contracts
  - name: feature-access
  - name: feature-flags
  - name: financial
  - name: healthz
  - name: installs
  - name: integrations
  - name: invoices
  - name: meta
  - name: permission-checks
  - name: permissions
  - name: projects
  - name: quickbooks
  - name: quotes
  - name: rbac
  - name: readyz
  - name: roles
  - name: schedules
  - name: tags
  - name: teams
  - name: test-auth
  - name: tickets
  - name: time-entries
  - name: time-periods
  - name: time-sheets
  - name: user
  - name: user-roles
  - name: users
  - name: webhooks
  - name: workflows
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Auth.js JWE session token
    SessionCookieAuth:
      type: apiKey
      in: cookie
      name: authjs.session-token
      description: Auth.js session cookie. In secure production deployments the cookie
        may be named __Secure-authjs.session-token; in local development it may
        include a port suffix.
    WebhookSignatureAuth:
      type: apiKey
      in: header
      name: x-webhook-signature
      description: HMAC-SHA256 signature generated with ALGA_WEBHOOK_SECRET. POST
        signs the raw JSON body. GET signs the string GET:<tenant_id>.
    GooglePubSubJWT:
      type: http
      scheme: bearer
      bearerFormat: Google Pub/Sub JWT
      description: Google-signed JWT from Pub/Sub push. The webhook validates the
        audience against the webhook URL and checks the issuer/service account
        against tenant Google configuration.
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details: {}
          required:
            - code
            - message
      required:
        - error
    PlaceholderObject:
      type: object
      properties: {}
    OAuthCallbackHtmlResponse:
      type: string
      description: HTML popup callback page. The page posts a JSON oauth-callback
        message to window.opener or window.parent via postMessage, then attempts
        to close itself.
    OAuthCallbackQuery:
      type: object
      properties:
        code:
          type: string
          description: OAuth 2.0 authorization code. Required unless the provider returned
            error.
        state:
          type: string
          description: Base64-encoded JSON state object generated when the OAuth flow was
            initiated. It carries tenant context, providerId, redirectUri,
            timestamp, and nonce values used to complete the callback.
        error:
          type: string
          description: OAuth error code returned by the provider, such as access_denied.
        error_description:
          type: string
          description: Human-readable OAuth error description returned by the provider.
    AuthSessionUser:
      type: object
      properties:
        id:
          type: string
          description: User identifier from the users.user_id record.
        email:
          type: string
          format: email
          description: User's email address.
        name:
          type: string
          description: User's display name, usually first_name plus last_name.
        username:
          type: string
          description: User's login username.
        image:
          type: string
          description: Avatar or profile image URL.
        proToken:
          type: string
          description: Legacy Pro token value when present.
        tenant:
          type: string
          description: Tenant UUID from the user session JWT.
        tenantSlug:
          type: string
          description: URL-safe tenant slug for portal routing.
        user_type:
          type: string
          enum:
            - client
            - internal
          description: User classification from users.user_type.
        clientId:
          type: string
          format: uuid
          description: Client UUID from contacts.client_id for client-portal users.
        contactId:
          type: string
          format: uuid
          description: Contact UUID from users.contact_id for client-portal users.
        plan:
          type: string
          description: Current tenant billing plan key.
        addons:
          type: array
          items:
            type: string
          description: Enabled tenant add-on keys.
        trial_end:
          type:
            - string
            - "null"
          description: Trial expiry timestamp when present.
        subscription_status:
          type:
            - string
            - "null"
          enum:
            - active
            - trialing
            - past_due
            - unpaid
          description: Billing subscription status copied into the session token.
        solo_pro_trial_end:
          type:
            - string
            - "null"
          description: Solo Pro trial expiry timestamp when present.
        premium_trial_end:
          type:
            - string
            - "null"
          description: Premium trial expiry timestamp when present.
        premium_trial_confirmed:
          type: boolean
          description: Whether the user confirmed the Premium trial.
        premium_trial_effective_date:
          type:
            - string
            - "null"
          description: Premium trial effective date when present.
      required:
        - id
        - email
        - name
        - username
    AuthSessionAuthenticatedResponse:
      type: object
      properties:
        session_id:
          type: string
          format: uuid
          description: Current session UUID from the sessions table, created at sign-in.
        login_method:
          type: string
          description: Authentication method used for this session, such as credentials,
            google, or azure-ad.
        user:
          $ref: "#/components/schemas/AuthSessionUser"
      required:
        - user
    EmptyObjectResponse:
      type: object
      properties: {}
      additionalProperties: false
      description: Empty object returned when no authenticated session is present.
    AuthSessionResponse:
      anyOf:
        - $ref: "#/components/schemas/AuthSessionAuthenticatedResponse"
        - $ref: "#/components/schemas/EmptyObjectResponse"
      description: Authenticated session data, or an empty object when the request has
        no valid session cookie.
    FlatErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Human-readable error message.
      required:
        - error
    ValidateApiKeyHeaders:
      type: object
      properties:
        x-api-key:
          type: string
          minLength: 1
          description: Plaintext API key to validate. The service hashes this value before
            looking up the api_keys record.
      required:
        - x-api-key
    ValidateApiKeyResponse:
      type: object
      properties:
        isValid:
          type: boolean
          enum:
            - true
          description: Indicates that the API key is active and valid.
        userId:
          type: string
          format: uuid
          description: UUID of the user who owns the API key, from api_keys.user_id.
        tenant:
          type: string
          description: Tenant identifier scoped to this API key, from api_keys.tenant.
      required:
        - isValid
        - userId
        - tenant
    ValidateTokenHeaders:
      type: object
      properties:
        authorization:
          type: string
          description: Optional Bearer token fallback. The route also accepts the Auth.js
            session token cookie.
    ValidateTokenSuccessResponse:
      type: object
      properties:
        isValid:
          type: boolean
          enum:
            - true
          description: Indicates that the request contains a valid Auth.js session token.
        userType:
          type: string
          enum:
            - internal
            - client
          description: User classification from users.user_type in the session JWT.
        tenant:
          type: string
          description: Tenant identifier from the session JWT.
      required:
        - isValid
        - userType
        - tenant
    ValidateTokenUnauthorizedResponse:
      type: object
      properties:
        isValid:
          type: boolean
          enum:
            - false
          description: No valid session token was found.
      required:
        - isValid
    NextAuthCatchAllParams:
      type: object
      properties:
        nextauth:
          type: string
          description: NextAuth catch-all action path. Common values include csrf,
            providers, signin, signout, session, error, verify-request,
            webauthn-options, callback/credentials, callback/google,
            callback/azure-ad, and callback/keycloak.
      required:
        - nextauth
    NextAuthGetQuery:
      type: object
      properties:
        callbackUrl:
          type: string
          description: Optional URL to redirect to after sign-in or sign-out flows.
        error:
          type: string
          description: Optional NextAuth/OAuth error code shown by sign-in or error pages.
        code:
          type: string
          description: OAuth authorization code for provider callback sub-routes.
        state:
          type: string
          description: OAuth state value for provider callback sub-routes.
        error_description:
          type: string
          description: Human-readable provider error description for OAuth callback
            sub-routes.
    CsrfTokenResponse:
      type: object
      properties:
        csrfToken:
          type: string
          description: Opaque double-submit CSRF token required for mutating NextAuth POST
            actions.
      required:
        - csrfToken
    ProviderInfo:
      type: object
      properties:
        id:
          type: string
          description: Provider identifier such as credentials, google, azure-ad, or
            keycloak.
        name:
          type: string
          description: Provider display name.
        type:
          type: string
          enum:
            - oauth
            - oidc
            - credentials
            - email
            - webauthn
          description: NextAuth provider type.
        signinUrl:
          type: string
          description: URL used to initiate sign-in with this provider.
        callbackUrl:
          type: string
          description: URL the provider redirects to after authentication.
      required:
        - id
        - name
        - type
        - signinUrl
        - callbackUrl
    AuthProvidersResponse:
      type: object
      additionalProperties:
        $ref: "#/components/schemas/ProviderInfo"
      description: Map of configured providers keyed by provider ID.
    NextAuthGetResponse:
      anyOf:
        - $ref: "#/components/schemas/AuthSessionAuthenticatedResponse"
        - $ref: "#/components/schemas/EmptyObjectResponse"
        - $ref: "#/components/schemas/CsrfTokenResponse"
        - $ref: "#/components/schemas/AuthProvidersResponse"
        - $ref: "#/components/schemas/OAuthCallbackHtmlResponse"
        - $ref: "#/components/schemas/EmptyObjectResponse"
      description: "Representative successful GET response for the NextAuth catch-all
        route. The exact payload depends on the nextauth action: session returns
        a session object or {}, csrf returns csrfToken, providers returns a
        provider map, and page actions return HTML or redirects."
    NextAuthPostBody:
      type: object
      properties:
        email:
          type: string
          format: email
          description: Credentials-provider email address for callback/credentials.
        password:
          type: string
          description: Credentials-provider plaintext password for callback/credentials.
        twoFactorCode:
          type: string
          description: TOTP code required when two-factor authentication is enabled and
            the device is not trusted.
        userType:
          type: string
          enum:
            - client
            - internal
          description: Optional user type used to scope credentials-provider lookup.
        tenant:
          type: string
          description: Optional tenant slug used to resolve the tenant for
            credentials-provider login.
        csrfToken:
          type: string
          description: CSRF token from GET /api/auth/csrf. Required for sign-in, sign-out,
            and other mutating NextAuth actions.
        callbackUrl:
          type: string
          description: Post-authentication redirect URL.
        redirect:
          type: string
          description: NextAuth redirect mode flag.
        json:
          type: string
          description: NextAuth JSON response mode flag.
        code:
          type: string
          description: OAuth authorization code for provider callback actions.
        state:
          type: string
          description: OAuth state value for provider callback actions.
        error:
          type: string
          description: Provider OAuth error code for callback actions.
        error_description:
          type: string
          description: Provider OAuth error description for callback actions.
    RedirectResponse:
      type: string
      description: HTTP redirect response. NextAuth sets or clears cookies depending
        on the action.
    LicenceCountHeaders:
      type: object
      properties:
        x-webhook-signature:
          type: string
          description: HMAC-SHA256 hex digest proving the caller knows ALGA_WEBHOOK_SECRET.
      required:
        - x-webhook-signature
    LicenceCountQuery:
      type: object
      properties:
        tenant_id:
          type: string
          description: Tenant identifier to query. This must match a tenants.tenant record.
      required:
        - tenant_id
    LicenceUsageResponse:
      type: object
      properties:
        tenant_id:
          type: string
          description: Echoed tenant identifier from the request.
        limit:
          type:
            - integer
            - "null"
          description: Licensed internal-user count from tenants.licensed_user_count. Null
            means unlimited.
        used:
          type: integer
          description: Count of active internal users where users.user_type is internal
            and is_inactive is false.
        remaining:
          type:
            - integer
            - "null"
          description: Calculated remaining seats as max(0, limit - used), or null when
            limit is unlimited.
        last_updated:
          type:
            - string
            - "null"
          description: ISO timestamp from tenants.last_license_update, or null if no
            license update has been recorded.
      required:
        - tenant_id
        - limit
        - used
        - remaining
        - last_updated
    LicenceCountUpdateRequest:
      type: object
      properties:
        tenant_id:
          type: string
          description: Tenant identifier from tenants.tenant whose licensed user count
            should be updated.
        license_count:
          type: integer
          minimum: 0
          description: Licensed internal-user count from the Stripe subscription quantity.
        event_id:
          type: string
          description: Stripe webhook event ID. When supplied, the handler uses
            tenants.stripe_event_id for idempotency.
      required:
        - tenant_id
        - license_count
    LicenceCountUpdateResponse:
      type: object
      properties:
        success:
          type: boolean
          enum:
            - true
          description: Indicates the license count update was accepted.
        tenant_id:
          type: string
          description: Echoed tenant identifier that was updated.
        license_count:
          type: integer
          description: Echoed licensed user count that was written.
        updated_at:
          type: string
          format: date-time
          description: ISO timestamp generated by the handler for this response.
      required:
        - success
        - tenant_id
        - license_count
        - updated_at
    LicenceCountErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Human-readable error message.
      required:
        - error
    ChatMessage:
      type: object
      properties:
        role:
          type: string
          enum:
            - user
            - assistant
          description: Role of the message author in the conversation.
        content:
          type: string
          description: Message text sent to the chat model.
      required:
        - role
        - content
    ChatStreamRequest:
      type: object
      properties:
        inputs:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
          minItems: 1
          description: Conversation messages in order. These are passed to the OpenRouter
            chat model.
        options:
          type: object
          additionalProperties: {}
          description: Optional model options. Currently declared by the internal
            interface but not consumed by the handler.
        model:
          type: string
          description: Optional model override. Currently ignored; the server uses
            OPENROUTER_CHAT_MODEL or minimax/minimax-m2.
        meta:
          type: object
          properties:
            authorization:
              type: string
              description: Optional downstream authorization token. Currently declared but not
                consumed by the handler.
          description: Optional metadata for legacy chat clients.
      required:
        - inputs
    ChatTitleStreamRequest:
      type: object
      properties:
        inputs:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
          minItems: 1
          description: Conversation messages used as context for generating a short chat
            title.
      required:
        - inputs
    ChatStreamEvent:
      type: object
      properties:
        content:
          type: string
          description: SSE data payload content. Normal events contain generated text;
            terminal events may contain [DONE].
        type:
          type: string
          enum:
            - text
            - error
          description: Event type. text carries model output; error carries an in-stream
            error message.
      required:
        - content
    ChatStreamError:
      type: object
      properties:
        error:
          type: string
          description: Human-readable error message.
      required:
        - error
    ChatStreamSlugParams:
      type: object
      properties:
        slug:
          type: string
          description: Catch-all chat stream path segment. The current handler accepts the
            value but does not use it.
      required:
        - slug
    DocumentDownloadParams:
      type: object
      properties:
        fileId:
          type: string
          format: uuid
          description: Document UUID or file UUID. The download handler resolves
            document_id first, then file_id.
      required:
        - fileId
    DocumentFileIdParams:
      type: object
      properties:
        fileId:
          type: string
          format: uuid
          description: File UUID from external_files.file_id identifying the stored file
            to serve.
      required:
        - fileId
    DocumentIdDownloadParams:
      type: object
      properties:
        documentId:
          type: string
          format: uuid
          description: Document UUID from documents.document_id, or file UUID from
            documents.file_id. The handler resolves document_id first and falls
            back to file_id.
      required:
        - documentId
    DocumentIdDownloadHeaders:
      type: object
      properties:
        x-api-key:
          type: string
          description: Optional API key for machine-to-machine download requests. Used
            only when no valid Auth.js session cookie is present.
    DocumentDownloadQuery:
      type: object
      properties:
        format:
          type: string
          enum: &a3
            - pdf
            - markdown
            - md
          description: Optional export format. pdf generates a PDF; markdown or md exports
            markdown; omitted downloads the original stored file.
    DocumentViewHeaders:
      type: object
      properties:
        range:
          type: string
          description: HTTP Range header for partial video responses, for example
            bytes=0-1048575. Only honored for video/* files.
        x-api-key:
          type: string
          description: Optional API key fallback for non-browser clients. Used only when
            no valid session cookie is present.
    BinaryFileResponse:
      type: string
      description: Binary file bytes streamed from the storage provider.
    MarkdownFileResponse:
      type: string
      description: Markdown export text generated from document content.
    DocumentDownloadError:
      type: object
      properties:
        error:
          type: string
          description: Human-readable error message.
        permissionError:
          type: string
          description: Permission-denied message returned by the underlying document
            action in some RBAC failures.
    DocumentPlainTextError:
      type: string
      description: Plain text error response.
    EmailErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Human-readable error message.
        success:
          type: boolean
          description: Present on some failure responses.
        retryable:
          type: boolean
          description: Whether a webhook sender should retry the request.
      required:
        - error
    EmailOAuthInitiateRequest:
      type: object
      properties:
        provider:
          type: string
          enum:
            - microsoft
            - google
          description: Email OAuth provider to authorize.
        redirectUri:
          type: string
          format: uri
          description: Optional OAuth callback URI. If omitted, the server builds
            /api/auth/{provider}/callback from the configured base URL.
        providerId:
          type: string
          format: uuid
          description: Email provider configuration ID to carry through OAuth state and
            use during callback token persistence.
      required:
        - provider
    EmailOAuthInitiateResponse:
      type: object
      properties:
        success:
          type: boolean
          enum:
            - true
          description: OAuth initiation succeeded.
        authUrl:
          type: string
          format: uri
          description: Provider authorization URL for the browser to visit.
        provider:
          type: string
          enum:
            - microsoft
            - google
          description: Email OAuth provider being authorized.
        state:
          type: string
          description: Base64-encoded OAuth state containing tenant, userId, providerId,
            redirectUri, timestamp, nonce, and hosted flag.
      required:
        - success
        - authUrl
        - provider
        - state
    EmailOAuthState:
      type: object
      properties:
        tenant:
          type: string
          description: Tenant identifier from the authenticated user session.
        userId:
          type: string
          description: User UUID from the authenticated session.
        providerId:
          type: string
          format: uuid
          description: Email provider configuration UUID from the initiate request.
        redirectUri:
          type: string
          description: OAuth redirect URI included in the authorization request.
        timestamp:
          type: number
          description: Epoch milliseconds when state was generated.
        nonce:
          type: string
          description: Random hex nonce for CSRF correlation.
        hosted:
          type: boolean
          description: Whether hosted credentials are used for the flow.
      required:
        - tenant
        - redirectUri
        - timestamp
        - nonce
    EmailRefreshWatchRequest:
      type: object
      properties:
        providerId:
          type: string
          format: uuid
          description: Active Gmail email provider ID from email_providers.id to refresh.
      required:
        - providerId
    EmailRefreshWatchResponse:
      type: object
      properties:
        success:
          type: boolean
          enum:
            - true
          description: Refresh completed successfully.
        message:
          type: string
          description: Human-readable success message.
        providerId:
          type: string
          format: uuid
          description: Email provider ID that was refreshed.
        mailbox:
          type: string
          format: email
          description: Mailbox address for the Gmail provider.
      required:
        - success
        - message
        - providerId
        - mailbox
    GooglePubSubMessage:
      type: object
      properties:
        data:
          type: string
          description: Base64-encoded Gmail notification JSON containing emailAddress and
            historyId.
        messageId:
          type: string
          description: Google Pub/Sub message ID.
        publishTime:
          type: string
          description: ISO timestamp when Pub/Sub published the message.
      required:
        - data
        - messageId
        - publishTime
    GooglePubSubPushBody:
      type: object
      properties:
        message:
          $ref: "#/components/schemas/GooglePubSubMessage"
        subscription:
          type: string
          description: Full Pub/Sub subscription path, such as
            projects/{project}/subscriptions/{subscriptionName}.
      required:
        - message
        - subscription
    GmailNotificationPayload:
      type: object
      properties:
        emailAddress:
          type: string
          format: email
          description: Gmail mailbox address with new activity.
        historyId:
          type: string
          description: Gmail history ID indicating the mailbox change position.
      required:
        - emailAddress
        - historyId
    GoogleWebhookEnqueueResponse:
      type: object
      properties:
        success:
          type: boolean
          enum:
            - true
          description: Webhook was accepted.
        queued:
          type: boolean
          enum:
            - true
          description: The notification was enqueued for asynchronous processing.
        handoff:
          type: string
          enum:
            - unified_pointer_queue
          description: Queue handoff mechanism used for the Gmail notification pointer.
        providerId:
          type: string
          format: uuid
          description: Resolved email_providers.id for the Gmail mailbox.
        tenant:
          type: string
          description: Tenant identifier owning the provider.
        historyId:
          type: string
          description: Gmail history ID from the decoded notification.
        jobId:
          type: string
          format: uuid
          description: UUID assigned to the Redis queue job.
        queueDepth:
          type: integer
          description: Redis queue depth after enqueue.
      required:
        - success
        - queued
        - handoff
        - providerId
        - tenant
        - historyId
        - jobId
        - queueDepth
    GoogleWebhookSkippedResponse:
      type: object
      properties:
        success:
          type: boolean
          enum:
            - true
          description: Webhook request was accepted but no job was enqueued.
        message:
          type: string
          enum:
            - No data to process
            - No provider found
            - No google config found
          description: Reason the webhook did not enqueue work.
      required:
        - success
        - message
    MicrosoftWebhookValidationQuery:
      type: object
      properties:
        validationtoken:
          type: string
          description: Microsoft Graph subscription validation token. The handler also
            accepts validationToken with camel-case spelling.
        validationToken:
          type: string
          description: Camel-case variant of the Microsoft Graph validation token.
    MicrosoftWebhookTextResponse:
      type: string
      description: Plain text response. For validation requests, this is the
        validation token echoed verbatim; otherwise it may be OK or Internal
        Server Error.
    MicrosoftGraphResourceData:
      type: object
      properties:
        "@odata.type":
          type: string
          description: "OData resource type, such as #microsoft.graph.message."
        "@odata.id":
          type: string
          description: OData resource identifier.
        id:
          type: string
          description: Microsoft Graph message ID. If absent, the handler extracts it from
            resource.
        subject:
          type: string
          description: Optional message subject supplied by Microsoft Graph.
    MicrosoftGraphNotification:
      type: object
      properties:
        changeType:
          type: string
