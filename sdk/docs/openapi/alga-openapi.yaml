        - ApiKeyAuth: []
      extensions:
        x-tenant-header-required: true
        x-rbac-resource: service
        x-chat-callable: true
        x-chat-display-name: List Services
        x-chat-rbac-resource: service
        x-chat-approval-required: false
      parameters:
        - schema:
            type: integer
            minimum: 1
            default: 1
          required: false
          name: page
          in: query
        - schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
          required: false
          name: limit
          in: query
        - schema:
            type: string
            enum:
              - service_name
              - billing_method
              - default_rate
            default: service_name
          required: false
          name: sort
          in: query
        - schema:
            type: string
            enum:
              - asc
              - desc
            default: asc
          required: false
          name: order
          in: query
        - schema:
            type: string
          required: false
          name: search
          in: query
        - schema:
            type: string
            enum:
              - service
              - product
              - any
          required: false
          name: item_kind
          in: query
        - schema:
            anyOf:
              - type: string
                enum:
                  - "true"
              - type: string
                enum:
                  - "false"
          required: false
          name: is_active
          in: query
        - schema:
            type: string
            enum: &a5
              - fixed
              - hourly
              - usage
          required: false
          name: billing_method
          in: query
        - schema:
            anyOf:
              - type: string
                format: uuid
              - type: string
                enum:
