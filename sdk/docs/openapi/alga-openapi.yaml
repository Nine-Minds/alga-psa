  /api/documents/download/{fileId}:
    get:
      summary: Download or export document file
      description: Downloads a stored document file, or exports the document as PDF or
        Markdown based on the optional format query parameter. The fileId path
        value may be either a documents.document_id or an
        external_files.file_id. The route requires an Auth.js session cookie and
        runs within the session tenant. The normal download path uses document
        read permission and document authorization rules; PDF and Markdown
        export paths perform tenant-scoped document lookup and generation.
      tags:
        - Documents
      security:
        - SessionCookieAuth: []
      extensions:
        x-download-formats:
          - original
          - pdf
          - markdown
        x-api-key-auth-skipped: true
      parameters:
        - schema:
            type: string
            format: uuid
            description: Document UUID or file UUID. The download handler resolves
              document_id first, then file_id.
          required: true
          description: Document UUID or file UUID. The download handler resolves
            document_id first, then file_id.
          name: fileId
          in: path
        - schema:
            type: string
            enum: *a3
            description: Optional export format. pdf generates a PDF; markdown or md exports
              markdown; omitted downloads the original stored file.
          required: false
          description: Optional export format. pdf generates a PDF; markdown or md exports
            markdown; omitted downloads the original stored file.
          name: format
          in: query
      responses:
        "200":
          description: File bytes for the original stored file, generated PDF, or Markdown
            text. Content-Type varies by requested format and stored MIME type.
          content:
            application/octet-stream:
              schema:
                $ref: "#/components/schemas/BinaryFileResponse"
        "400":
          description: Invalid or missing fileId.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentDownloadError"
        "401":
          description: No valid session is present.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentDownloadError"
        "404":
          description: Document or file was not found, has no associated file, or has no
            exportable content.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentDownloadError"
        "500":
          description: Export, generated-PDF download, storage, or unexpected internal
            failure.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentDownloadError"
  /api/documents/{documentId}/download:
    get:
      summary: Download document attachment
      description: Downloads the original stored file for a document as an attachment.
        The documentId path value is resolved against documents.document_id
        first, then documents.file_id. The route supports Auth.js session-cookie
        authentication and x-api-key fallback for machine clients, derives the
        tenant from the authenticated principal, requires document:read
        permission, and runs document authorization rules before reading the
        file from storage.
      tags:
        - Documents
      security:
        - SessionCookieAuth: []
        - ApiKeyAuth: []
      extensions:
        x-auth-modes:
          - session-cookie
          - api-key
        x-id-resolution: document_id_then_file_id
        x-rbac-required: document:read
      parameters:
        - schema:
            type: string
            format: uuid
            description: Document UUID from documents.document_id, or file UUID from
              documents.file_id. The handler resolves document_id first and
              falls back to file_id.
          required: true
          description: Document UUID from documents.document_id, or file UUID from
            documents.file_id. The handler resolves document_id first and falls
            back to file_id.
          name: documentId
          in: path
        - schema:
            type: string
            description: Optional API key for machine-to-machine download requests. Used
              only when no valid Auth.js session cookie is present.
          required: false
          description: Optional API key for machine-to-machine download requests. Used
            only when no valid Auth.js session cookie is present.
          name: x-api-key
          in: header
      responses:
        "200":
          description: Binary file stream with attachment Content-Disposition headers.
            Content-Type varies by stored MIME type.
          content:
            application/octet-stream:
              schema:
                $ref: "#/components/schemas/BinaryFileResponse"
        "400":
          description: Missing documentId path parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentDownloadError"
        "401":
          description: No valid session or API key was supplied.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentDownloadError"
        "403":
          description: Authenticated user lacks document:read permission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentDownloadError"
        "404":
          description: Document not found, document has no file_id, or file
            metadata/storage record was not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentDownloadError"
        "500":
          description: Unexpected internal failure while downloading the document.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentDownloadError"
  /api/documents/view/{fileId}:
    get:
      summary: View document file inline
      description: Streams a stored file for inline browser viewing, such as images,
        videos, PDFs, and SVGs. Tenant logo files are public. Other files
        require either a valid Auth.js session cookie or an x-api-key header,
        then document-level authorization is checked using RBAC, relationship
        rules, bundle narrowing, and client visibility rules. Video files
        support HTTP Range requests and may return 206 Partial Content.
      tags:
        - Documents
      security:
        - SessionCookieAuth: []
        - ApiKeyAuth: []
        - {}
      extensions:
        x-supports-range-requests: true
        x-public-when-tenant-logo: true
        x-api-key-auth-skipped: true
      parameters:
        - schema:
            type: string
            format: uuid
            description: File UUID from external_files.file_id identifying the stored file
              to serve.
          required: true
          description: File UUID from external_files.file_id identifying the stored file
            to serve.
          name: fileId
          in: path
        - schema:
            type: string
            description: HTTP Range header for partial video responses, for example
              bytes=0-1048575. Only honored for video/* files.
          required: false
          description: HTTP Range header for partial video responses, for example
            bytes=0-1048575. Only honored for video/* files.
          name: range
          in: header
        - schema:
            type: string
            description: Optional API key fallback for non-browser clients. Used only when
              no valid session cookie is present.
          required: false
          description: Optional API key fallback for non-browser clients. Used only when
            no valid session cookie is present.
          name: x-api-key
          in: header
      responses:
        "200":
          description: Full file stream for inline viewing.
          content:
            application/octet-stream:
              schema:
                $ref: "#/components/schemas/BinaryFileResponse"
        "206":
          description: Partial file stream for a valid video Range request.
          content:
            application/octet-stream:
              schema:
                $ref: "#/components/schemas/BinaryFileResponse"
        "400":
          description: Missing fileId or unsupported file type for inline viewing.
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/DocumentPlainTextError"
        "401":
          description: No valid session or API key was supplied.
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/DocumentPlainTextError"
        "403":
          description: Authenticated user is not authorized to view the file.
          content:
            text/plain:
