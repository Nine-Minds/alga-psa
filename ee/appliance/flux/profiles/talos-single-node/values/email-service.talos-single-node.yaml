namespace: msp
enabled: true

image:
  repository: ghcr.io/nine-minds/email-service
  tag: latest
  pullPolicy: IfNotPresent
  is_private: false
  credentials: ""

app:
  edition: enterprise
  env: production
  name: alga-psa

redis:
  host: redis.msp.svc.cluster.local
  port: "6379"
  passwordSecret:
    name: redis-credentials
    key: REDIS_PASSWORD

db:
  type: postgres
  host: pgbouncer.msp.svc.cluster.local
  port: "6432"
  serverDatabase: server
  user: app_user
  serverPasswordSecret:
    name: db-credentials
    key: DB_PASSWORD_SERVER
  adminUser: postgres
  adminPasswordSecret:
    name: db-credentials
    key: DB_PASSWORD_SUPERUSER
