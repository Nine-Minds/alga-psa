namespace: msp
env: production
edition: enterprise
# Appliance deployment profile -> capabilities (portal-domain provisioner = direct,
# trustForwardedHost = true). Custom portal domains use a bring-your-own reverse proxy.
deploymentProfile: appliance
host: alga.local
appUrl: https://alga.local
domainSuffix: alga.local

bootstrap:
  mode: recover

setup:
  runMigrations: true
  runSeeds: true
  applianceBootstrap:
    enabled: true
    waitTimeoutSeconds: 300
    retryIntervalSeconds: 2
    lockTimeoutSeconds: 1800
    lockStaleSeconds: 120
    lockHeartbeatSeconds: 10
  waitForBootstrap:
    image:
      name: ankane/pgvector
      tag: latest
    pullPolicy: IfNotPresent
  image:
    name: ghcr.io/nine-minds/alga-psa-ee
    is_private: false
    credentials: ""
    tag: latest
  pullPolicy: IfNotPresent

server:
  image:
    name: ghcr.io/nine-minds/alga-psa-ee
    is_private: false
    credentials: ""
    tag: latest
  pullPolicy: IfNotPresent
  hostNetwork: true
  replicaCount: 1
  progressDeadlineSeconds: 2400
  service:
    type: ClusterIP
    port: 3000
  persistence:
    enabled: true
    mountPath: /data/files
    size: 50Gi
    storageClass: local-path

hocuspocus:
  enabled: false

temporal:
  address: temporal-frontend.msp.svc.cluster.local:7233
  namespace: default

db:
  enabled: true
  persistence:
    enabled: true
    size: 50Gi
    storageClass: local-path

redis:
  enabled: true
  persistence:
    enabled: true
    size: 20Gi
    storageClass: local-path

persistence:
  keepPvcOnUninstall: true

pgbouncer:
  enabled: false
  service:
    name: pgbouncer
    port: 6432

config:
  storage:
    default_provider: local
    providers:
      local:
        enabled: true
        base_path: /data/files
    locations:
      documents:
        provider: local
      avatars:
        provider: local
