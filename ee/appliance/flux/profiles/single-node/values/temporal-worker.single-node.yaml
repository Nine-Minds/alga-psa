namespace: msp
enabled: true
replicaCount: 1

image:
  repository: ghcr.io/nine-minds/temporal-worker
  tag: latest
  pullPolicy: IfNotPresent
  is_private: false
  credentials: ""

temporal:
  address: temporal-frontend.msp.svc.cluster.local:7233
  namespace: default
  # No portal-domain-workflows: the appliance uses the `direct` provisioner
  # (deploymentProfile: appliance), so portal-domain registration never enqueues
  # a workflow. Re-add this queue only if a future profile provisions domains via Temporal.
  taskQueue: tenant-workflows,email-domain-workflows

db:
  host: pgbouncer.msp.svc.cluster.local
  port: "6432"
  serverDatabase: server
  user: app_user_pgbouncer
  serverPasswordSecret:
    name: db-credentials
    key: DB_PASSWORD_PGBOUNCER
  adminPasswordSecret:
    name: db-credentials
    key: DB_PASSWORD_SUPERUSER

applicationUrl: http://alga-core.msp.svc.cluster.local:3000

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 1
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

livenessProbe:
  initialDelaySeconds: 300
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 10

readinessProbe:
  initialDelaySeconds: 120
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 30

auth:
  nextauthSecretSecret:
    name: alga-core-sebastian-secrets
    key: NEXTAUTH_SECRET

# No portalDomain block: the appliance does not provision portal domains via the
# Temporal worker (Istio/cert-manager are absent). Domains are activated directly
# by alga-core (deploymentProfile: appliance -> direct provisioner).
