apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: appliance-values-alga-core
    namespace: alga-system
    files:
      - alga-core.single-node.yaml=values/alga-core.single-node.yaml
  - name: appliance-values-pgbouncer
    namespace: alga-system
    files:
      - pgbouncer.single-node.yaml=values/pgbouncer.single-node.yaml
  - name: appliance-values-temporal
    namespace: alga-system
    files:
      - temporal.single-node.yaml=values/temporal.single-node.yaml
  - name: appliance-values-workflow-worker
    namespace: alga-system
    files:
      - workflow-worker.single-node.yaml=values/workflow-worker.single-node.yaml
  - name: appliance-values-email-service
    namespace: alga-system
    files:
      - email-service.single-node.yaml=values/email-service.single-node.yaml
  - name: appliance-values-temporal-worker
    namespace: alga-system
    files:
      - temporal-worker.single-node.yaml=values/temporal-worker.single-node.yaml
