apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: alga-core
  namespace: alga-system
spec:
  interval: 10m
  releaseName: alga-core
  targetNamespace: msp
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: ./helm
      interval: 10m
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: appliance-values-alga-core
      valuesKey: alga-core.talos-single-node.yaml
