apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: temporal-worker
  namespace: alga-system
spec:
  interval: 10m
  timeout: 30m
  dependsOn:
    - name: alga-core
    - name: pgbouncer
    - name: temporal
  releaseName: temporal-worker
  targetNamespace: msp
  install:
    createNamespace: true
    remediation:
      retries: 0
  upgrade:
    remediation:
      retries: 0
  chart:
    spec:
      chart: temporal-worker
      version: 0.1.0
      interval: 10m
      reconcileStrategy: Revision
      sourceRef:
        kind: HelmRepository
        name: alga-charts
        namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: appliance-values-temporal-worker
      valuesKey: temporal-worker.single-node.yaml
