apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: workflow-worker
  namespace: alga-system
spec:
  interval: 10m
  timeout: 30m
  dependsOn:
    - name: alga-core
    - name: pgbouncer
    # The worker connects to Temporal on startup with no retry; gate the release
    # on Temporal being Ready so it isn't installed into a race at the Flux layer.
    - name: temporal
  releaseName: workflow-worker
  targetNamespace: msp
  install:
    createNamespace: true
    remediation:
      retries: 0
  upgrade:
    remediation:
      retries: 0
  chart:
    spec:
      chart: workflow-worker
      version: 0.1.0
      interval: 10m
      reconcileStrategy: Revision
      sourceRef:
        kind: HelmRepository
        name: alga-charts
        namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: appliance-values-workflow-worker
      valuesKey: workflow-worker.single-node.yaml
