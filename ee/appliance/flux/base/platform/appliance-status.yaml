apiVersion: v1
kind: ServiceAccount
metadata:
  name: appliance-status
  namespace: appliance-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: appliance-status
  namespace: appliance-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: appliance-status
  template:
    metadata:
      labels:
        app.kubernetes.io/name: appliance-status
    spec:
      serviceAccountName: appliance-status
      automountServiceAccountToken: false
      containers:
        - name: status
          image: node:20-alpine
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              cat <<'JS' >/tmp/server.js
              const http = require('http');
              const token = process.env.STATUS_TOKEN || '';

              function unauthorized(res) {
                res.writeHead(401, {
                  'Content-Type': 'application/json',
                  'WWW-Authenticate': 'Bearer realm="appliance-status"',
                });
                res.end(JSON.stringify({ error: 'unauthorized' }));
              }

              function isAuthorized(req) {
                if (!token) return false;
                const auth = req.headers.authorization || '';
                if (auth.startsWith('Bearer ')) {
                  return auth.slice('Bearer '.length).trim() === token;
                }

                const url = new URL(req.url, 'http://localhost');
                return url.searchParams.get('token') === token;
              }

              const server = http.createServer((req, res) => {
                if (!isAuthorized(req)) {
                  unauthorized(res);
                  return;
                }

                if (req.url.startsWith('/api/status')) {
                  res.writeHead(200, { 'Content-Type': 'application/json' });
                  res.end(JSON.stringify({
                    status: 'installing',
                    service: 'appliance-status',
                    message: 'Bootstrap status service is installed. Full status payload integration is in progress.',
                    timestamp: new Date().toISOString(),
                  }));
                  return;
                }

                if (req.url.startsWith('/healthz')) {
                  res.writeHead(200, { 'Content-Type': 'text/plain' });
                  res.end('ok');
                  return;
                }

                res.writeHead(200, { 'Content-Type': 'text/html; charset=utf-8' });
                res.end('<!doctype html><html><body><h1>Appliance Status</h1><p>Use /api/status with Bearer token authentication.</p></body></html>');
              });

              server.listen(8080, '0.0.0.0');
              JS
              exec node /tmp/server.js
          env:
            - name: STATUS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: appliance-status-auth
                  key: token
          ports:
            - name: http
              containerPort: 8080
              hostPort: 8080
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 1
            periodSeconds: 5
      volumes:
        - name: tmp
          emptyDir: {}
