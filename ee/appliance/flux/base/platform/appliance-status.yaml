apiVersion: v1
kind: ServiceAccount
metadata:
  name: appliance-status
  namespace: appliance-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: appliance-status-readonly
rules:
  - apiGroups: [""]
    resources: ["nodes", "pods", "persistentvolumeclaims", "events", "configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["source.toolkit.fluxcd.io"]
    resources: ["gitrepositories"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["kustomize.toolkit.fluxcd.io"]
    resources: ["kustomizations"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["helm.toolkit.fluxcd.io"]
    resources: ["helmreleases"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: appliance-status-readonly
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: appliance-status-readonly
subjects:
  - kind: ServiceAccount
    name: appliance-status
    namespace: appliance-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: appliance-status
  namespace: appliance-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: appliance-status
  template:
    metadata:
      labels:
        app.kubernetes.io/name: appliance-status
    spec:
      serviceAccountName: appliance-status
      automountServiceAccountToken: false
      containers:
        - name: status
          image: node:20-alpine
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              cat <<'JS' >/tmp/server.js
              const http = require('http');
              const token = process.env.STATUS_TOKEN || '';
              const hostIp = process.env.HOST_IP || '';
              const loginUrl = hostIp ? `http://${hostIp}:3000` : null;

              function readOverview() {
                return {
                  installState: 'installing',
                  currentPhase: 'bootstrap_in_progress',
                  loginUrl,
                  nextAction: 'Keep this page open and refresh while core services bootstrap.',
                  message: loginUrl
                    ? 'Appliance bootstrap is in progress. Login will be available once core services are ready.'
                    : 'Appliance bootstrap is in progress.',
                  timestamp: new Date().toISOString(),
                };
              }

              function readDiagnostics() {
                const overview = readOverview();
                return {
                  overview,
                  tiers: {
                    platform: { ready: false, status: 'progressing' },
                    core: { ready: false, status: 'progressing' },
                    bootstrap: { ready: false, status: 'progressing' },
                    login: { ready: false, status: 'progressing' },
                    background: { ready: false, status: 'progressing' },
                    fullHealth: { ready: false, status: 'progressing' },
                  },
                  components: [
                    { name: 'alga-core', layer: 'core', status: 'progressing' },
                    { name: 'workflow-worker', layer: 'background', status: 'pending' },
                    { name: 'temporal', layer: 'background', status: 'pending' },
                  ],
                  topBlockers: [],
                  recentEvents: [],
                  flux: {
                    source: { status: 'unknown' },
                    helmReleases: [],
                  },
                  supportBundle: {
                    available: true,
                    action: 'run_script',
                    script: 'ee/appliance/scripts/collect-support-bundle.sh',
                    requiresToken: true,
                    note: 'Bundle download endpoint is deferred; run via CLI/operator for now.',
                  },
                };
              }

              function unauthorized(res) {
                res.writeHead(401, {
                  'Content-Type': 'application/json',
                  'WWW-Authenticate': 'Bearer realm="appliance-status"',
                });
                res.end(JSON.stringify({ error: 'unauthorized' }));
              }

              function isAuthorized(req) {
                if (!token) return false;
                const auth = req.headers.authorization || '';
                if (auth.startsWith('Bearer ')) {
                  return auth.slice('Bearer '.length).trim() === token;
                }

                const url = new URL(req.url, 'http://localhost');
                return url.searchParams.get('token') === token;
              }

              const server = http.createServer((req, res) => {
                if (!isAuthorized(req)) {
                  unauthorized(res);
                  return;
                }

                if (req.url.startsWith('/api/status')) {
                  const overview = readOverview();
                  res.writeHead(200, { 'Content-Type': 'application/json' });
                  res.end(JSON.stringify({
                    status: overview.installState,
                    service: 'appliance-status',
                    message: overview.message,
                    currentPhase: overview.currentPhase,
                    loginUrl: overview.loginUrl,
                    nextAction: overview.nextAction,
                    timestamp: overview.timestamp,
                  }));
                  return;
                }

                if (req.url.startsWith('/api/overview')) {
                  res.writeHead(200, { 'Content-Type': 'application/json' });
                  res.end(JSON.stringify(readOverview()));
                  return;
                }

                if (req.url.startsWith('/api/diagnostics')) {
                  res.writeHead(200, { 'Content-Type': 'application/json' });
                  res.end(JSON.stringify(readDiagnostics()));
                  return;
                }

                if (req.url.startsWith('/healthz')) {
                  res.writeHead(200, { 'Content-Type': 'text/plain' });
                  res.end('ok');
                  return;
                }

                if (req.url.startsWith('/diagnostics')) {
                  const page = '<!doctype html><html><head><meta charset="utf-8" /><title>Appliance Diagnostics</title><style>body{font-family:-apple-system,BlinkMacSystemFont,\"Segoe UI\",sans-serif;margin:24px;line-height:1.45}.card{max-width:920px;border:1px solid #ddd;border-radius:8px;padding:16px}pre{background:#f8f8f8;border:1px solid #eee;padding:12px;overflow:auto}</style></head><body><div class=\"card\"><h1>Advanced Diagnostics</h1><p>Readiness tiers, components, blockers, events, and Flux/Helm state.</p><pre id=\"diag\">Loading...</pre></div><script>fetch(\"/api/diagnostics\"+window.location.search).then((r)=>{if(!r.ok)throw new Error(\"Unauthorized or unavailable\");return r.json();}).then((data)=>{document.getElementById(\"diag\").textContent=JSON.stringify(data,null,2);}).catch((err)=>{document.getElementById(\"diag\").textContent=err.message;});</script></body></html>';
                  res.writeHead(200, { 'Content-Type': 'text/html; charset=utf-8' });
                  res.end(page);
                  return;
                }

                const page = '<!doctype html><html><head><meta charset="utf-8" /><title>Appliance Status</title><style>body{font-family:-apple-system,BlinkMacSystemFont,\"Segoe UI\",sans-serif;margin:24px;line-height:1.45}.card{max-width:760px;border:1px solid #ddd;border-radius:8px;padding:16px}h1{margin-top:0}.row{margin:8px 0}.label{font-weight:600}code{background:#f4f4f4;padding:2px 4px;border-radius:4px}</style></head><body><div class=\"card\"><h1>Appliance Status</h1><p id=\"summary\">Loading status...</p><div class=\"row\"><span class=\"label\">Install state:</span> <span id=\"install-state\">-</span></div><div class=\"row\"><span class=\"label\">Current phase:</span> <span id=\"phase\">-</span></div><div class=\"row\"><span class=\"label\">Login URL:</span> <span id=\"login-url\">-</span></div><div class=\"row\"><span class=\"label\">Next action:</span> <span id=\"next-action\">-</span></div><div class=\"row\"><small>API: <code>/api/status</code> and <code>/api/overview</code> (token required)</small></div></div><script>fetch(\"/api/overview\"+window.location.search).then((r)=>{if(!r.ok)throw new Error(\"Unauthorized or unavailable\");return r.json();}).then((data)=>{document.getElementById(\"summary\").textContent=data.message||\"Appliance status loaded.\";document.getElementById(\"install-state\").textContent=data.installState||\"-\";document.getElementById(\"phase\").textContent=data.currentPhase||\"-\";document.getElementById(\"login-url\").textContent=data.loginUrl||\"Not available yet\";document.getElementById(\"next-action\").textContent=data.nextAction||\"-\";}).catch((err)=>{document.getElementById(\"summary\").textContent=err.message;});</script></body></html>';
                res.writeHead(200, { 'Content-Type': 'text/html; charset=utf-8' });
                res.end(page);
              });

              server.listen(8080, '0.0.0.0');
              JS
              exec node /tmp/server.js
          env:
            - name: STATUS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: appliance-status-auth
                  key: token
            - name: HOST_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
          ports:
            - name: http
              containerPort: 8080
              hostPort: 8080
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 1
            periodSeconds: 5
      volumes:
        - name: tmp
          emptyDir: {}
