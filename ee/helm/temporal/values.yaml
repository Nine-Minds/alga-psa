enabled: true

namespace: ""
nameOverride: ""
fullnameOverride: ""

server:
  image:
    repository: temporalio/auto-setup
    tag: 1.27.2
    pullPolicy: IfNotPresent
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

ui:
  enabled: true
  image:
    repository: temporalio/ui
    tag: 2.30.0
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    port: 8080
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

service:
  name: temporal-frontend
  port: 7233

db:
  host: db.msp.svc.cluster.local
  port: 5432
  adminUser: postgres
  adminPasswordSecret:
    name: db-credentials
    key: DB_PASSWORD_SUPERUSER

temporal:
  db: postgres12
  namespace: default
  postgresSeeds: postgres

podAnnotations: {}
podLabels: {}
nodeSelector: {}
tolerations: []
affinity: {}
