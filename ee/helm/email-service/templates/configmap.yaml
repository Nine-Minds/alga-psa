{{- if .Values.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "email-service.fullname" . }}
  namespace: {{ include "email-service.namespace" . }}
  labels:
    {{- include "email-service.labels" . | nindent 4 }}
    app.kubernetes.io/component: email-service
data:
  email-service-config.json: |
    {
      "logging": {
        "level": "{{ .Values.logLevel }}"
      },
      "imap": {
        "providerRefreshMs": {{ .Values.imap.providerRefreshMs | int }},
        "pollIntervalMs": {{ .Values.imap.pollIntervalMs | int }},
        "leaseTtlMs": {{ .Values.imap.leaseTtlMs | int }},
        "maxConnectionsPerTenant": {{ .Values.imap.maxConnectionsPerTenant | int }}
      }
    }
{{- end }}

