{{- if .Values.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "email-service.fullname" . }}
  namespace: {{ include "email-service.namespace" . }}
  labels:
    {{- include "email-service.labels" . | nindent 4 }}
    app.kubernetes.io/component: email-service
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "email-service.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: email-service
{{- end }}

