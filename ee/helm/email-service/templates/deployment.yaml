{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "email-service.fullname" . }}
  namespace: {{ include "email-service.namespace" . }}
  labels:
    {{- include "email-service.labels" . | nindent 4 }}
    app.kubernetes.io/component: email-service
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: {{ .Values.rollingUpdate.maxSurge | default 1 }}
      maxUnavailable: {{ .Values.rollingUpdate.maxUnavailable | default 0 }}
  selector:
    matchLabels:
      {{- include "email-service.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: email-service
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secrets: {{ include (print $.Template.BasePath "/secrets.yaml") . | sha256sum }}
        {{- if .Values.vaultAgent.enabled }}
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "{{ .Values.vaultAgent.role }}"
        vault.hashicorp.com/agent-inject-secret-service: "{{ .Values.vaultAgent.secretPath }}"
        vault.hashicorp.com/agent-inject-secret-shared: "{{ .Values.vaultAgent.sharedSecretPath }}"
        vault.hashicorp.com/agent-inject-template-service: |
          {{`{{- with secret "`}}{{ .Values.vaultAgent.secretPath }}{{`" -}}
          export NEXTAUTH_SECRET="{{ .Data.data.nextauth_secret }}"
          export TOKEN_SECRET_KEY="{{ .Data.data.token_secret_key }}"
          export CRYPTO_KEY="{{ .Data.data.crypto_key }}"
          {{- end }}`}}
        {{- end }}
      labels:
        {{- include "email-service.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: email-service
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "email-service.serviceAccountName" . }}
      {{- if .Values.image.credentials }}
      imagePullSecrets:
        - name: {{ .Values.image.credentials | quote }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.waitForBootstrap.enabled }}
      initContainers:
        - name: wait-for-bootstrap
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.waitForBootstrap.image.name }}:{{ .Values.waitForBootstrap.image.tag }}"
          imagePullPolicy: {{ .Values.waitForBootstrap.pullPolicy }}
          command: ["/bin/sh", "-ec"]
          args:
            - |
              echo "Waiting for the email_providers table to exist..."
              until PGPASSWORD="${WAIT_DB_PASSWORD}" psql -h "${DB_HOST}" -p "${DB_PORT}" -U "${WAIT_DB_USER}" -d "${DB_NAME_SERVER}" -Atqc "SELECT EXISTS (SELECT 1 FROM information_schema.tables WHERE table_schema = 'public' AND table_name = 'email_providers');" 2>/dev/null | grep -q '^t$'; do
                sleep 2
              done
          env:
            - name: DB_HOST
              value: "{{ .Values.db.host }}"
            - name: DB_PORT
              value: "{{ .Values.db.port }}"
            - name: DB_NAME_SERVER
              value: "{{ .Values.db.serverDatabase }}"
            # Use the server (pgbouncer) credentials for the readiness poll: the
            # superuser may not be authenticated through pgbouncer, and reading
            # information_schema only needs the app role.
            - name: WAIT_DB_USER
              value: "{{ .Values.db.user }}"
            - name: WAIT_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.db.serverPasswordSecret.name }}
                  key: {{ .Values.db.serverPasswordSecret.key }}
      {{- end }}
      containers:
        - name: email-service
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if .Values.vaultAgent.enabled }}
          command: ["/bin/sh"]
          args:
            - -c
            - |
              . /vault/secrets/service
              exec node .
          {{- end }}
          env:
            - name: NODE_ENV
              value: "production"
            - name: LOG_LEVEL
              value: "{{ .Values.logLevel }}"
            - name: PORT
              value: "{{ .Values.service.port }}"

            - name: EDITION
              value: "{{ .Values.app.edition }}"
            - name: APP_ENV
              value: "{{ .Values.app.env }}"
            - name: APP_NAME
              value: "{{ .Values.app.name }}"

            # DB configuration
            - name: DB_TYPE
              value: "{{ .Values.db.type | default "postgres" }}"
            - name: DB_HOST
              value: "{{ .Values.db.host }}"
            - name: DB_PORT
              value: "{{ .Values.db.port }}"
            - name: DB_NAME_SERVER
              value: "{{ .Values.db.serverDatabase }}"
            - name: DB_USER_SERVER
              value: "{{ .Values.db.user }}"
            - name: DB_PASSWORD_SERVER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.db.serverPasswordSecret.name }}
                  key: {{ .Values.db.serverPasswordSecret.key }}

            {{- if and .Values.db.adminPasswordSecret.name .Values.db.adminPasswordSecret.key }}
            - name: DB_USER_ADMIN
              value: "{{ .Values.db.adminUser | default "postgres" }}"
            - name: DB_PASSWORD_ADMIN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.db.adminPasswordSecret.name }}
                  key: {{ .Values.db.adminPasswordSecret.key }}
            {{- end }}

            # Redis (for event publisher)
            - name: REDIS_HOST
              value: "{{ .Values.redis.host }}"
            - name: REDIS_PORT
              value: "{{ .Values.redis.port }}"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.redis.passwordSecret.name }}
                  key: {{ .Values.redis.passwordSecret.key }}

            # Secrets provider configuration
            - name: SECRET_READ_CHAIN
              value: "{{ .Values.secretsProvider.readChain }}"
            - name: SECRET_WRITE_PROVIDER
              value: "{{ .Values.secretsProvider.writeProvider }}"
            {{- if .Values.sharedTenantSecrets.enabled }}
            - name: SECRET_FS_BASE_PATH
              value: "{{ .Values.sharedTenantSecrets.mountPath }}"
            {{- end }}
            {{- if .Values.secretsProvider.vault.addr }}
            - name: VAULT_ADDR
              value: "{{ .Values.secretsProvider.vault.addr }}"
            {{- end }}
            {{- if and .Values.secretsProvider.vault.tokenSecret.name .Values.secretsProvider.vault.tokenSecret.key }}
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretsProvider.vault.tokenSecret.name }}
                  key: {{ .Values.secretsProvider.vault.tokenSecret.key }}
            {{- end }}
            - name: VAULT_APP_SECRET_PATH
              value: "{{ .Values.secretsProvider.vault.appSecretPath }}"
            - name: VAULT_TENANT_SECRET_PATH_TEMPLATE
              value: "{{ .Values.secretsProvider.vault.tenantSecretPathTemplate }}"

            # IMAP tuning
            - name: IMAP_PROVIDER_REFRESH_MS
              value: "{{ .Values.imap.providerRefreshMs }}"
            - name: IMAP_POLL_INTERVAL_MS
              value: "{{ .Values.imap.pollIntervalMs }}"
            - name: IMAP_LEASE_TTL_MS
              value: "{{ .Values.imap.leaseTtlMs }}"
            - name: IMAP_MAX_CONNECTIONS_PER_TENANT
              value: "{{ .Values.imap.maxConnectionsPerTenant }}"
            - name: IMAP_MAX_ATTACHMENT_BYTES
              value: "{{ .Values.imap.maxAttachmentBytes }}"
            - name: IMAP_FETCH_DELAY_MS
              value: "{{ .Values.imap.fetchDelayMs }}"
            - name: IMAP_EVENT_CHANNEL_BY_TENANT
              value: {{ ternary "\"true\"" "\"false\"" .Values.imap.eventChannelByTenant | quote }}
            - name: IMAP_OAUTH_AUTH_MECHANISM
              value: "{{ .Values.imap.oauthAuthMechanism }}"
            - name: IMAP_TLS_REJECT_UNAUTHORIZED
              value: {{ ternary "\"true\"" "\"false\"" .Values.imap.tlsRejectUnauthorized | quote }}
            - name: IMAP_CONNECTION_TIMEOUT_MS
              value: "{{ .Values.imap.connectionTimeoutMs }}"
            - name: IMAP_MAX_EMAILS_PER_SYNC
              value: "{{ .Values.imap.maxEmailsPerSync }}"
            - name: IMAP_SOCKET_KEEPALIVE
              value: {{ ternary "\"true\"" "\"false\"" .Values.imap.socketKeepalive | quote }}
            - name: IMAP_TIMER_JITTER_PCT
              value: "{{ .Values.imap.timerJitterPct }}"
            - name: IMAP_STARTUP_STAGGER_MS
              value: "{{ .Values.imap.startupStaggerMs }}"
            - name: IMAP_RECONNECT_JITTER_PCT
              value: "{{ .Values.imap.reconnectJitterPct }}"
            {{- if .Values.webhook.url }}
            - name: IMAP_WEBHOOK_URL
              value: "{{ .Values.webhook.url }}"
            {{- end }}
            - name: IMAP_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ default (printf "%s-secrets" (include "email-service.fullname" .)) .Values.webhook.secretKeyRef.name | quote }}
                  key: {{ default "IMAP_WEBHOOK_SECRET" .Values.webhook.secretKeyRef.key | quote }}

            {{- if not .Values.vaultAgent.enabled }}
            {{- $appSecretName := .Values.appSecrets.existingSecret | default (printf "%s-secrets" (include "email-service.fullname" .)) }}
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ $appSecretName | quote }}
                  key: {{ if .Values.appSecrets.existingSecret }}{{ .Values.appSecrets.keys.nextauthSecret | quote }}{{ else }}NEXTAUTH_SECRET{{ end }}
            - name: TOKEN_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $appSecretName | quote }}
                  key: {{ if .Values.appSecrets.existingSecret }}{{ .Values.appSecrets.keys.tokenSecretKey | quote }}{{ else }}TOKEN_SECRET_KEY{{ end }}
            - name: CRYPTO_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $appSecretName | quote }}
                  key: {{ if .Values.appSecrets.existingSecret }}{{ .Values.appSecrets.keys.cryptoKey | quote }}{{ else }}CRYPTO_KEY{{ end }}
            {{- end }}

            {{- range .Values.extraEnv }}
            - name: {{ .name }}
              {{- if hasKey . "valueFrom" }}
              valueFrom:
                {{- toYaml .valueFrom | nindent 16 }}
              {{- else }}
              value: {{ .value | quote }}
              {{- end }}
            {{- end }}

          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP

          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
            successThreshold: {{ .Values.livenessProbe.successThreshold | default 1 }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold | default 3 }}

          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
            successThreshold: {{ .Values.readinessProbe.successThreshold | default 1 }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold | default 3 }}

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          volumeMounts:
            {{- if .Values.sharedTenantSecrets.enabled }}
            - name: shared-tenant-secrets
              mountPath: {{ .Values.sharedTenantSecrets.mountPath }}
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}

      volumes:
        {{- if .Values.sharedTenantSecrets.enabled }}
        - name: shared-tenant-secrets
          hostPath:
            path: {{ .Values.sharedTenantSecrets.hostPath }}
            type: DirectoryOrCreate
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
{{- end }}
