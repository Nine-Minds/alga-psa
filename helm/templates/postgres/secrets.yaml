{{- if .Values.db.enabled }}
{{- $ns := include "sebastian.namespace" . -}}
{{- $existing := (lookup "v1" "Secret" $ns "db-credentials") -}}
{{- $annotations := dict -}}
{{- if and $existing $existing.metadata $existing.metadata.annotations -}}
{{- $annotations = $existing.metadata.annotations -}}
{{- end -}}
{{- $owned := and $existing (eq (get $annotations "meta.helm.sh/release-name") .Release.Name) -}}
{{- if or (not $existing) $owned }}
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: {{ include "sebastian.namespace" . }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/resource-policy": keep
type: Opaque
data:
  DB_PASSWORD_HOCUSPOCUS: {{ randAlphaNum 32 | b64enc | quote }}
  DB_PASSWORD_SERVER: {{ randAlphaNum 32 | b64enc | quote }}
  DB_PASSWORD_SUPERUSER: {{ randAlphaNum 32 | b64enc | quote }}
{{- end }}
{{- end }}
