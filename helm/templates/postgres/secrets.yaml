{{- if .Values.db.enabled }}
{{- $ns := include "sebastian.namespace" . -}}
{{- $existing := (lookup "v1" "Secret" $ns "db-credentials") -}}
{{- $existingPVC := (lookup "v1" "PersistentVolumeClaim" $ns (printf "%s-postgres-data" (include "sebastian.fullname" .))) -}}
{{- $annotations := dict -}}
{{- if and $existing $existing.metadata $existing.metadata.annotations -}}
{{- $annotations = $existing.metadata.annotations -}}
{{- end -}}
{{- $owned := and $existing (eq (get $annotations "meta.helm.sh/release-name") .Release.Name) -}}
{{- if and (not $existing) $existingPVC }}
{{- fail (printf "Refusing to generate db-credentials because PVC %s/%s already exists. Existing appliance data must be recovered with the original secret or wiped before a fresh install." $ns (printf "%s-postgres-data" (include "sebastian.fullname" .))) }}
{{- end }}
{{- if or (not $existing) $owned }}
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: {{ include "sebastian.namespace" . }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
data:
  DB_PASSWORD_HOCUSPOCUS: {{ randAlphaNum 32 | b64enc | quote }}
  DB_PASSWORD_PGBOUNCER: {{ randAlphaNum 32 | b64enc | quote }}
  DB_PASSWORD_SERVER: {{ randAlphaNum 32 | b64enc | quote }}
  DB_PASSWORD_SUPERUSER: {{ randAlphaNum 32 | b64enc | quote }}
{{- end }}
{{- end }}
